<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg2)" rx="12"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#accent2)" rx="2"/>

  <text x="450" y="48" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="14" font-weight="bold" letter-spacing="4">SECTION 2</text>
  <text x="450" y="82" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="bold">Defining Instance Methods</text>
  <text x="450" y="108" text-anchor="middle" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="14">Functions that live inside a class and operate on self</text>

  <!-- Code block with annotations -->
  <rect x="40" y="130" width="520" height="360" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="2"/>

  <!-- Line numbers -->
  <text x="60" y="165" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">1</text>
  <text x="60" y="190" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">2</text>
  <text x="60" y="215" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">3</text>
  <text x="60" y="240" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">4</text>
  <text x="60" y="265" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">5</text>
  <text x="60" y="290" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">6</text>
  <text x="60" y="315" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">7</text>
  <text x="60" y="340" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">8</text>
  <text x="60" y="365" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">9</text>
  <text x="60" y="390" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">10</text>
  <text x="60" y="415" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">11</text>
  <text x="60" y="440" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">12</text>
  <text x="60" y="465" fill="#4a5568" font-family="'Courier New',monospace" font-size="12">13</text>

  <!-- Code -->
  <text x="90" y="165" fill="#e94560" font-family="'Courier New',monospace" font-size="13">class</text>
  <text x="133" y="165" fill="#ffd700" font-family="'Courier New',monospace" font-size="13">Hero:</text>
  <text x="110" y="190" fill="#c792ea" font-family="'Courier New',monospace" font-size="13">def</text>
  <text x="145" y="190" fill="#82aaff" font-family="'Courier New',monospace" font-size="13">__init__</text>
  <text x="213" y="190" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">(self, name, hp):</text>
  <text x="130" y="215" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">self.name = name</text>
  <text x="130" y="240" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">self.hp = hp</text>
  <text x="90" y="275" fill="#546e7a" font-family="'Courier New',monospace" font-size="13"># ⚡ NEW: Instance method</text>

  <!-- Highlighted method -->
  <rect x="85" y="282" width="460" height="58" rx="6" fill="#e94560" opacity="0.08" stroke="#e94560" stroke-width="1"/>
  <text x="110" y="305" fill="#c792ea" font-family="'Courier New',monospace" font-size="13">def</text>
  <text x="145" y="305" fill="#82aaff" font-family="'Courier New',monospace" font-size="13">attack</text>
  <text x="196" y="305" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">(self):</text>
  <text x="130" y="330" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">print(</text>
  <text x="183" y="330" fill="#c3e88d" font-family="'Courier New',monospace" font-size="13">f"{self.name} swings sword!"</text>
  <text x="461" y="330" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">)</text>

  <text x="90" y="365" fill="#546e7a" font-family="'Courier New',monospace" font-size="13"># Using the method:</text>
  <text x="90" y="390" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">hero = Hero(</text>
  <text x="196" y="390" fill="#c3e88d" font-family="'Courier New',monospace" font-size="13">"Aria"</text>
  <text x="248" y="390" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">, 100)</text>

  <!-- Call highlight -->
  <rect x="85" y="400" width="300" height="26" rx="6" fill="#ffd700" opacity="0.08" stroke="#ffd700" stroke-width="1"/>
  <text x="90" y="418" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">hero.</text>
  <text x="130" y="418" fill="#82aaff" font-family="'Courier New',monospace" font-size="13">attack</text>
  <text x="180" y="418" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">()</text>

  <text x="90" y="448" fill="#546e7a" font-family="'Courier New',monospace" font-size="13"># Output: Aria swings sword!</text>

  <!-- Right side annotations -->
  <rect x="590" y="140" width="270" height="105" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="725" y="168" text-anchor="middle" fill="#e94560" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold">📐 Syntax Pattern</text>
  <text x="615" y="195" fill="#c792ea" font-family="'Courier New',monospace" font-size="12">def</text>
  <text x="648" y="195" fill="#82aaff" font-family="'Courier New',monospace" font-size="12">method_name</text>
  <text x="746" y="195" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">(self):</text>
  <text x="635" y="218" fill="#8892b0" font-family="'Courier New',monospace" font-size="11"># code here</text>
  <text x="615" y="238" fill="#4a5568" font-family="'Segoe UI',sans-serif" font-size="11">↑ Always indented inside the class</text>

  <!-- Self explanation -->
  <rect x="590" y="260" width="270" height="90" rx="10" fill="#0f3460" stroke="#ffd700" stroke-width="1"/>
  <text x="725" y="288" text-anchor="middle" fill="#ffd700" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold">🔑 self = "this object"</text>
  <text x="725" y="312" text-anchor="middle" fill="#ccd6f6" font-family="'Segoe UI',sans-serif" font-size="12">self.name → this hero's name</text>
  <text x="725" y="332" text-anchor="middle" fill="#ccd6f6" font-family="'Segoe UI',sans-serif" font-size="12">self.hp → this hero's health</text>

  <!-- Calling explanation -->
  <rect x="590" y="365" width="270" height="105" rx="10" fill="#0f3460" stroke="#00e676" stroke-width="1"/>
  <text x="725" y="393" text-anchor="middle" fill="#00e676" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold">📞 Calling a Method</text>
  <text x="615" y="418" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">hero.attack()</text>
  <text x="615" y="442" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">Python auto-passes self</text>
  <text x="615" y="460" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">You DON'T write hero.attack(hero)</text>

  <!-- Bottom bar -->
  <rect x="40" y="495" width="820" height="2" fill="#0f3460"/>
  <text x="450" y="512" text-anchor="middle" fill="#4a5568" font-family="'Courier New',monospace" font-size="10">U3B3 — OOP Part 2: Methods, Sprites &amp; super() | Principles of Computing</text>
</svg>