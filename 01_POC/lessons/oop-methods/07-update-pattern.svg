<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg7)" rx="12"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#accent7)" rx="2"/>

  <text x="450" y="48" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="14" font-weight="bold" letter-spacing="4">SECTION 7</text>
  <text x="450" y="82" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="bold">The update() Pattern</text>
  <text x="450" y="108" text-anchor="middle" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="14">Override update() to tell each sprite how to behave every frame</text>

  <!-- Game loop diagram -->
  <rect x="40" y="130" width="260" height="350" rx="10" fill="#16213e" stroke="#c792ea" stroke-width="2"/>
  <rect x="40" y="130" width="260" height="32" rx="10" fill="#c792ea" opacity="0.15"/>
  <text x="170" y="153" text-anchor="middle" fill="#c792ea" font-family="'Courier New',monospace" font-size="13" font-weight="bold">🔁 GAME LOOP</text>

  <!-- Loop steps -->
  <rect x="60" y="175" width="220" height="30" rx="6" fill="#0f3460"/>
  <text x="170" y="195" text-anchor="middle" fill="#8892b0" font-family="'Courier New',monospace" font-size="11">1. Handle events</text>

  <text x="170" y="220" text-anchor="middle" fill="#4a5568" font-size="16">↓</text>

  <rect x="60" y="230" width="220" height="30" rx="6" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1"/>
  <text x="170" y="250" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="11" font-weight="bold">2. all_sprites.update()</text>

  <text x="170" y="275" text-anchor="middle" fill="#4a5568" font-size="16">↓</text>

  <rect x="60" y="285" width="220" height="30" rx="6" fill="#0f3460"/>
  <text x="170" y="305" text-anchor="middle" fill="#8892b0" font-family="'Courier New',monospace" font-size="11">3. screen.fill(BLACK)</text>

  <text x="170" y="330" text-anchor="middle" fill="#4a5568" font-size="16">↓</text>

  <rect x="60" y="340" width="220" height="30" rx="6" fill="#0f3460"/>
  <text x="170" y="360" text-anchor="middle" fill="#8892b0" font-family="'Courier New',monospace" font-size="11">4. all_sprites.draw(screen)</text>

  <text x="170" y="385" text-anchor="middle" fill="#4a5568" font-size="16">↓</text>

  <rect x="60" y="395" width="220" height="30" rx="6" fill="#0f3460"/>
  <text x="170" y="415" text-anchor="middle" fill="#8892b0" font-family="'Courier New',monospace" font-size="11">5. pygame.display.flip()</text>

  <!-- Repeat arrow -->
  <text x="170" y="445" text-anchor="middle" fill="#c792ea" font-family="'Segoe UI',sans-serif" font-size="12">↻ repeat 60x/second</text>

  <!-- Arrow from loop to code -->
  <line x1="300" y1="245" x2="330" y2="245" stroke="#e94560" stroke-width="2"/>
  <polygon points="330,240 340,245 330,250" fill="#e94560"/>

  <!-- Player update() code -->
  <rect x="340" y="130" width="520" height="175" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <rect x="340" y="130" width="520" height="32" rx="10" fill="#e94560" opacity="0.15"/>
  <text x="600" y="153" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="13" font-weight="bold">⚡ Player.update() — runs every frame</text>

  <text x="370" y="183" fill="#c792ea" font-family="'Courier New',monospace" font-size="12">def</text>
  <text x="403" y="183" fill="#82aaff" font-family="'Courier New',monospace" font-size="12">update</text>
  <text x="453" y="183" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">(self):</text>
  <text x="390" y="208" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">keys = pygame.key.get_pressed()</text>
  <text x="390" y="233" fill="#e94560" font-family="'Courier New',monospace" font-size="12">if</text>
  <text x="413" y="233" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">keys[pygame.K_RIGHT]:</text>
  <text x="410" y="258" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">self.rect.x += 5</text>
  <text x="570" y="258" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># move right</text>
  <text x="390" y="283" fill="#e94560" font-family="'Courier New',monospace" font-size="12">if</text>
  <text x="413" y="283" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">keys[pygame.K_LEFT]:</text>
  <text x="410" y="298" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">self.rect.x -= 5</text>
  <text x="570" y="298" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># move left</text>

  <!-- Monster update() code -->
  <rect x="340" y="320" width="520" height="145" rx="10" fill="#16213e" stroke="#00e676" stroke-width="2"/>
  <rect x="340" y="320" width="520" height="32" rx="10" fill="#00e676" opacity="0.15"/>
  <text x="600" y="343" text-anchor="middle" fill="#00e676" font-family="'Courier New',monospace" font-size="13" font-weight="bold">👾 Monster.update() — different behavior!</text>

  <text x="370" y="375" fill="#c792ea" font-family="'Courier New',monospace" font-size="12">def</text>
  <text x="403" y="375" fill="#82aaff" font-family="'Courier New',monospace" font-size="12">update</text>
  <text x="453" y="375" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">(self):</text>
  <text x="390" y="400" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">self.rect.x += self.dx</text>
  <text x="600" y="400" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># auto-move</text>
  <text x="390" y="425" fill="#e94560" font-family="'Courier New',monospace" font-size="12">if</text>
  <text x="413" y="425" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">self.rect.right > 800:</text>
  <text x="410" y="450" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">self.dx *= -1</text>
  <text x="600" y="450" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># bounce!</text>

  <!-- Key insight -->
  <rect x="40" y="470" width="260" height="25" rx="6" fill="#ffd700" opacity="0.1" stroke="#ffd700" stroke-width="1"/>
  <text x="170" y="487" text-anchor="middle" fill="#ffd700" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="bold">Same method name, different behavior!</text>

  <rect x="40" y="500" width="820" height="2" fill="#0f3460"/>
  <text x="450" y="515" text-anchor="middle" fill="#4a5568" font-family="'Courier New',monospace" font-size="10">U3B3 — OOP Part 2: Methods, Sprites &amp; super() | Principles of Computing</text>
</svg>