<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="pygame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg6)" rx="12"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#accent6)" rx="2"/>

  <text x="450" y="48" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="14" font-weight="bold" letter-spacing="4">SECTION 6</text>
  <text x="450" y="82" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="bold">Pygame Sprites &amp; Groups</text>
  <text x="450" y="108" text-anchor="middle" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="14">Inheritance in action — your classes extend pygame.sprite.Sprite</text>

  <!-- What Sprite gives you -->
  <rect x="40" y="130" width="400" height="160" rx="10" fill="#16213e" stroke="#00e676" stroke-width="2"/>
  <rect x="40" y="130" width="400" height="32" rx="10" fill="#00e676" opacity="0.15"/>
  <text x="240" y="153" text-anchor="middle" fill="#00e676" font-family="'Courier New',monospace" font-size="13" font-weight="bold">🎮 pygame.sprite.Sprite gives you:</text>

  <text x="70" y="185" fill="#00e676" font-family="'Courier New',monospace" font-size="12">•</text>
  <text x="90" y="185" fill="#ccd6f6" font-family="'Courier New',monospace" font-size="12">self.image</text>
  <text x="220" y="185" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">— what the sprite looks like</text>

  <text x="70" y="210" fill="#00e676" font-family="'Courier New',monospace" font-size="12">•</text>
  <text x="90" y="210" fill="#ccd6f6" font-family="'Courier New',monospace" font-size="12">self.rect</text>
  <text x="210" y="210" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">— where it is (position + size)</text>

  <text x="70" y="235" fill="#00e676" font-family="'Courier New',monospace" font-size="12">•</text>
  <text x="90" y="235" fill="#ccd6f6" font-family="'Courier New',monospace" font-size="12">.kill()</text>
  <text x="175" y="235" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">— remove from all groups</text>

  <text x="70" y="260" fill="#00e676" font-family="'Courier New',monospace" font-size="12">•</text>
  <text x="90" y="260" fill="#ccd6f6" font-family="'Courier New',monospace" font-size="12">.update()</text>
  <text x="195" y="260" fill="#8892b0" font-family="'Segoe UI',sans-serif" font-size="11">— called each frame (you override)</text>

  <!-- Sprite Group -->
  <rect x="460" y="130" width="400" height="160" rx="10" fill="#16213e" stroke="#c792ea" stroke-width="2"/>
  <rect x="460" y="130" width="400" height="32" rx="10" fill="#c792ea" opacity="0.15"/>
  <text x="660" y="153" text-anchor="middle" fill="#c792ea" font-family="'Courier New',monospace" font-size="13" font-weight="bold">📦 pygame.sprite.Group</text>

  <text x="490" y="185" fill="#ccd6f6" font-family="'Segoe UI',sans-serif" font-size="12">A container that holds sprites:</text>

  <text x="490" y="215" fill="#c792ea" font-family="'Courier New',monospace" font-size="12">monsters = pygame.sprite.Group()</text>
  <text x="490" y="240" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">monsters.add(goblin, skeleton)</text>
  <text x="490" y="265" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">monsters.update()</text>
  <text x="710" y="265" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># updates ALL</text>
  <text x="490" y="285" fill="#ffffff" font-family="'Courier New',monospace" font-size="12">monsters.draw(screen)</text>
  <text x="710" y="285" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># draws ALL</text>

  <!-- Code example -->
  <rect x="40" y="305" width="820" height="185" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <rect x="40" y="305" width="820" height="32" rx="10" fill="#e94560" opacity="0.15"/>
  <text x="450" y="327" text-anchor="middle" fill="#e94560" font-family="'Courier New',monospace" font-size="13" font-weight="bold">⚡ YOUR FIRST SPRITE CLASS (this is inheritance + super() in action!)</text>

  <text x="70" y="358" fill="#e94560" font-family="'Courier New',monospace" font-size="13">class</text>
  <text x="113" y="358" fill="#ffd700" font-family="'Courier New',monospace" font-size="13">Player</text>
  <text x="162" y="358" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">(pygame.sprite.Sprite):</text>
  <text x="450" y="358" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># inherits from Sprite!</text>

  <text x="90" y="383" fill="#c792ea" font-family="'Courier New',monospace" font-size="13">def</text>
  <text x="125" y="383" fill="#82aaff" font-family="'Courier New',monospace" font-size="13">__init__</text>
  <text x="193" y="383" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">(self, x, y):</text>

  <!-- super highlight -->
  <rect x="105" y="392" width="280" height="24" rx="5" fill="#ffd700" opacity="0.1" stroke="#ffd700" stroke-width="1"/>
  <text x="110" y="410" fill="#ffd700" font-family="'Courier New',monospace" font-size="13" font-weight="bold">super().__init__()</text>
  <text x="400" y="410" fill="#546e7a" font-family="'Courier New',monospace" font-size="11"># set up Sprite internals</text>

  <text x="110" y="435" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">self.image = pygame.Surface((32, 32))</text>
  <text x="110" y="458" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">self.image.fill(</text>
  <text x="265" y="458" fill="#c3e88d" font-family="'Courier New',monospace" font-size="13">"green"</text>
  <text x="318" y="458" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">)</text>
  <text x="110" y="480" fill="#ffffff" font-family="'Courier New',monospace" font-size="13">self.rect = self.image.get_rect(center=(x, y))</text>

  <!-- Connection callout -->
  <rect x="590" y="390" width="250" height="90" rx="8" fill="#0f3460" stroke="#ffd700" stroke-width="1" stroke-dasharray="4"/>
  <text x="715" y="415" text-anchor="middle" fill="#ffd700" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="bold">🔗 CONNECTION</text>
  <text x="715" y="438" text-anchor="middle" fill="#ccd6f6" font-family="'Segoe UI',sans-serif" font-size="11">This is the SAME pattern you'll</text>
  <text x="715" y="455" text-anchor="middle" fill="#ccd6f6" font-family="'Segoe UI',sans-serif" font-size="11">use in Monster Wrangler for</text>
  <text x="715" y="472" text-anchor="middle" fill="#e94560" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="bold">Player, Monster, and Game!</text>

  <rect x="40" y="495" width="820" height="2" fill="#0f3460"/>
  <text x="450" y="512" text-anchor="middle" fill="#4a5568" font-family="'Courier New',monospace" font-size="10">U3B3 — OOP Part 2: Methods, Sprites &amp; super() | Principles of Computing</text>
</svg>