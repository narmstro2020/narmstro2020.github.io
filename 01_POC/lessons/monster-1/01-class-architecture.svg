<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="gameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d4faa"/>
    </linearGradient>
    <linearGradient id="playerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <linearGradient id="monsterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f85149"/>
      <stop offset="100%" style="stop-color:#b62324"/>
    </linearGradient>
    <linearGradient id="spriteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6e40c9"/>
      <stop offset="100%" style="stop-color:#4c2b8a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Markers defined here BEFORE use -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6e40c9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#30363d" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="bold" letter-spacing="2">MONSTER WRANGLER — CLASS ARCHITECTURE</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Build Day 1 — March 5</text>
  <line x1="60" y1="68" x2="840" y2="68" stroke="#21262d" stroke-width="1"/>

  <!-- pygame.sprite.Sprite base -->
  <rect x="310" y="82" width="280" height="46" rx="8" fill="url(#spriteGrad)" opacity="0.9"/>
  <text x="450" y="100" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">pygame.sprite.Sprite</text>
  <text x="450" y="118" text-anchor="middle" fill="#c8b1ff" font-size="11">Base class — image, rect, groups</text>

  <!-- Inheritance arrows: Sprite → Player (straight down), Sprite → Monster (diagonal right) -->
  <line x1="430" y1="128" x2="430" y2="167" stroke="#6e40c9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <line x1="560" y1="128" x2="730" y2="167" stroke="#6e40c9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- GAME CLASS BOX (left-center) -->
  <rect x="30" y="170" width="240" height="290" rx="10" fill="#0d1117" stroke="#1f6feb" stroke-width="2.5"/>
  <rect x="30" y="170" width="240" height="40" rx="10" fill="url(#gameGrad)"/>
  <rect x="30" y="196" width="240" height="14" fill="url(#gameGrad)"/>
  <text x="150" y="194" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Game</text>
  <text x="150" y="224" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic"># Controls all gameplay</text>

  <!-- Game attributes -->
  <text x="46" y="248" fill="#79c0ff" font-size="11">ATTRIBUTES</text>
  <line x1="46" y1="253" x2="254" y2="253" stroke="#21262d" stroke-width="1"/>
  <text x="46" y="268" fill="#e6edf3" font-size="10">score, round_number</text>
  <text x="46" y="282" fill="#e6edf3" font-size="10">round_time, frame_count</text>
  <text x="46" y="296" fill="#e6edf3" font-size="10">player, monster_group</text>
  <text x="46" y="310" fill="#e6edf3" font-size="10">font, target_monster_images[ ]</text>
  <text x="46" y="324" fill="#e6edf3" font-size="10">target_monster_type, _image, _rect</text>

  <!-- Game methods -->
  <text x="46" y="344" fill="#79c0ff" font-size="11">METHODS</text>
  <line x1="46" y1="349" x2="254" y2="349" stroke="#21262d" stroke-width="1"/>
  <text x="46" y="363" fill="#56d364" font-size="10">✓ __init__(player, monster_group)</text>
  <text x="46" y="377" fill="#56d364" font-size="10">✓ update()</text>
  <text x="46" y="391" fill="#56d364" font-size="10">✓ draw()</text>
  <text x="46" y="405" fill="#f8c57a" font-size="10">→ check_collisions()  [Day 2]</text>
  <text x="46" y="419" fill="#f8c57a" font-size="10">→ start_new_round()   [Day 2]</text>
  <text x="46" y="433" fill="#f8c57a" font-size="10">→ choose_new_target() [Day 2]</text>
  <text x="46" y="447" fill="#f8c57a" font-size="10">→ pause_game()        [Day 3]</text>
  <text x="46" y="461" fill="#f8c57a" font-size="10">→ reset_game()        [Day 3]</text>

  <!-- BUILD DAY 1 badge on Game -->
  <rect x="140" y="455" width="118" height="18" rx="4" fill="#1f6feb" opacity="0.3" stroke="#1f6feb" stroke-width="1"/>
  <text x="199" y="468" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">BUILD TODAY ✓</text>

  <!-- PLAYER CLASS BOX (center) -->
  <rect x="330" y="170" width="240" height="290" rx="10" fill="#0d1117" stroke="#3fb950" stroke-width="2.5"/>
  <rect x="330" y="170" width="240" height="40" rx="10" fill="url(#playerGrad)"/>
  <rect x="330" y="196" width="240" height="14" fill="url(#playerGrad)"/>
  <text x="450" y="194" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Player</text>
  <text x="450" y="224" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">extends pygame.sprite.Sprite</text>

  <text x="346" y="248" fill="#56d364" font-size="11">ATTRIBUTES</text>
  <line x1="346" y1="253" x2="554" y2="253" stroke="#21262d" stroke-width="1"/>
  <text x="346" y="268" fill="#e6edf3" font-size="10">image  (knight.png)</text>
  <text x="346" y="282" fill="#e6edf3" font-size="10">rect   (position)</text>
  <text x="346" y="296" fill="#e6edf3" font-size="10">lives = 5</text>
  <text x="346" y="310" fill="#e6edf3" font-size="10">warps = 2</text>
  <text x="346" y="324" fill="#e6edf3" font-size="10">velocity = 8</text>
  <text x="346" y="338" fill="#e6edf3" font-size="10">catch_sound, die_sound, warp_sound</text>

  <text x="346" y="358" fill="#56d364" font-size="11">METHODS</text>
  <line x1="346" y1="363" x2="554" y2="363" stroke="#21262d" stroke-width="1"/>
  <text x="346" y="377" fill="#56d364" font-size="10">✓ __init__()</text>
  <text x="346" y="391" fill="#56d364" font-size="10">✓ update()  ← arrow key movement</text>
  <text x="346" y="405" fill="#56d364" font-size="10">✓ warp()    ← spacebar</text>
  <text x="346" y="419" fill="#56d364" font-size="10">✓ reset()   ← re-center</text>

  <rect x="340" y="455" width="118" height="18" rx="4" fill="#3fb950" opacity="0.3" stroke="#3fb950" stroke-width="1"/>
  <text x="399" y="468" text-anchor="middle" fill="#56d364" font-size="10" font-weight="bold">BUILD TODAY ✓</text>

  <!-- MONSTER CLASS BOX (right) -->
  <rect x="630" y="170" width="240" height="290" rx="10" fill="#0d1117" stroke="#f85149" stroke-width="2.5" stroke-dasharray="8,4"/>
  <rect x="630" y="170" width="240" height="40" rx="10" fill="url(#monsterGrad)" opacity="0.6"/>
  <rect x="630" y="196" width="240" height="14" fill="url(#monsterGrad)" opacity="0.6"/>
  <text x="750" y="194" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Monster</text>
  <text x="750" y="224" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">extends pygame.sprite.Sprite</text>

  <text x="646" y="248" fill="#ff7b72" font-size="11">ATTRIBUTES</text>
  <line x1="646" y1="253" x2="854" y2="253" stroke="#21262d" stroke-width="1"/>
  <text x="646" y="268" fill="#8b949e" font-size="10">image  (color-specific)</text>
  <text x="646" y="282" fill="#8b949e" font-size="10">rect   (position)</text>
  <text x="646" y="296" fill="#8b949e" font-size="10">type   (0=blue 1=green 2=purple 3=yellow)</text>
  <text x="646" y="310" fill="#8b949e" font-size="10">dx, dy (direction)</text>
  <text x="646" y="324" fill="#8b949e" font-size="10">velocity (random 1–5)</text>

  <text x="646" y="344" fill="#ff7b72" font-size="11">METHODS</text>
  <line x1="646" y1="349" x2="854" y2="349" stroke="#21262d" stroke-width="1"/>
  <text x="646" y="363" fill="#f8c57a" font-size="10">→ __init__(x, y, image, type)  [Day 2]</text>
  <text x="646" y="377" fill="#f8c57a" font-size="10">→ update()  — bouncing motion  [Day 2]</text>

  <rect x="640" y="455" width="118" height="18" rx="4" fill="#f85149" opacity="0.2" stroke="#f85149" stroke-width="1"/>
  <text x="699" y="468" text-anchor="middle" fill="#ff7b72" font-size="10" font-weight="bold">BUILD DAY 2 →</text>

  <!-- Arrow: Game "has-a" Player — horizontal from Game right to Player left -->
  <line x1="272" y1="270" x2="327" y2="270" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="300" y="263" text-anchor="middle" fill="#79c0ff" font-size="9">has-a</text>

  <!-- Arrow: Game "has-a" monster_group — arc from Game right, below boxes, to Monster left -->
  <path d="M 270,340 C 440,490 520,490 628,340" stroke="#1f6feb" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="450" y="486" text-anchor="middle" fill="#79c0ff" font-size="9">has-a (monster_group)</text>

  <!-- Legend -->
  <rect x="30" y="488" width="840" height="24" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="44" y="495" width="10" height="10" rx="2" fill="#56d364"/>
  <text x="60" y="504" fill="#8b949e" font-size="10">Build Today</text>
  <rect x="144" y="495" width="10" height="10" rx="2" fill="#f8c57a"/>
  <text x="160" y="504" fill="#8b949e" font-size="10">Build Day 2</text>
  <rect x="244" y="495" width="10" height="10" rx="2" fill="#8b949e"/>
  <text x="260" y="504" fill="#8b949e" font-size="10">Build Day 3</text>
  <line x1="350" y1="498" x2="370" y2="498" stroke="#6e40c9" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="376" y="504" fill="#8b949e" font-size="10">inheritance</text>
  <line x1="450" y1="498" x2="470" y2="498" stroke="#1f6feb" stroke-width="2"/>
  <text x="476" y="504" fill="#8b949e" font-size="10">has-a (composition)</text>


</svg>