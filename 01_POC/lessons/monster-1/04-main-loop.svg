<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56d364"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f8c57a"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="url(#bg)" rx="12"/>
  <rect width="900" height="460" fill="none" stroke="#30363d" stroke-width="1.5" rx="12"/>

  <text x="450" y="36" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="bold" letter-spacing="1">WIRING IT ALL TOGETHER — MAIN LOOP</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- Setup column (left) -->
  <rect x="30" y="62" width="260" height="380" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <rect x="30" y="62" width="260" height="24" rx="8" fill="#21262d"/>
  <rect x="30" y="74" width="260" height="12" fill="#21262d"/>
  <text x="160" y="78" text-anchor="middle" fill="#8b949e" font-size="10">SETUP (before loop)</text>

  <text x="46" y="104" fill="#8b949e" font-size="11"># Sprite groups</text>
  <text x="46" y="120" fill="#e6edf3" font-size="11">player_group = </text><text x="164" y="120" fill="#a5d6ff" font-size="11">Group()</text>
  <text x="46" y="136" fill="#e6edf3" font-size="11">my_player = </text><text x="148" y="136" fill="#79c0ff" font-size="11">Player()</text>
  <text x="46" y="152" fill="#e6edf3" font-size="11">player_group.</text><text x="152" y="152" fill="#56d364" font-size="11">add</text><text x="172" y="152" fill="#e6edf3" font-size="11">(my_player)</text>

  <line x1="46" y1="164" x2="274" y2="164" stroke="#21262d" stroke-width="1"/>

  <text x="46" y="180" fill="#e6edf3" font-size="11">monster_group = </text><text x="176" y="180" fill="#a5d6ff" font-size="11">Group()</text>
  <text x="46" y="196" fill="#8b949e" font-size="11"># Monsters added later</text>
  <text x="46" y="212" fill="#8b949e" font-size="11"># by start_new_round()</text>

  <line x1="46" y1="224" x2="274" y2="224" stroke="#21262d" stroke-width="1"/>

  <text x="46" y="240" fill="#8b949e" font-size="11"># Game object</text>
  <text x="46" y="256" fill="#e6edf3" font-size="11">my_game = </text><text x="138" y="256" fill="#79c0ff" font-size="11">Game</text><text x="170" y="256" fill="#e6edf3" font-size="11">(</text>
  <text x="62" y="272" fill="#e6edf3" font-size="11">  my_player,</text>
  <text x="62" y="288" fill="#e6edf3" font-size="11">  monster_group</text>
  <text x="46" y="304" fill="#e6edf3" font-size="11">)</text>

  <line x1="46" y1="316" x2="274" y2="316" stroke="#21262d" stroke-width="1"/>

  <text x="46" y="332" fill="#8b949e" font-size="11"># Intro screen</text>
  <text x="46" y="348" fill="#e6edf3" font-size="11">my_game.</text><text x="122" y="348" fill="#d2a8ff" font-size="11">pause_game</text><text x="200" y="348" fill="#e6edf3" font-size="11">(...)</text>
  <text x="46" y="364" fill="#e6edf3" font-size="11">my_game.</text><text x="122" y="364" fill="#d2a8ff" font-size="11">start_new_round</text><text x="234" y="364" fill="#e6edf3" font-size="11">()</text>

  <!-- Main loop column (center) -->
  <rect x="320" y="62" width="270" height="380" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <rect x="320" y="62" width="270" height="24" rx="8" fill="#1c2128"/>
  <rect x="320" y="74" width="270" height="12" fill="#1c2128"/>
  <text x="455" y="78" text-anchor="middle" fill="#56d364" font-size="10">MAIN GAME LOOP</text>

  <text x="336" y="104" fill="#ff7b72" font-size="12">while</text>
  <text x="372" y="104" fill="#e6edf3" font-size="12"> running:</text>

  <text x="336" y="124" fill="#8b949e" font-size="10">    # Events</text>
  <text x="336" y="138" fill="#ff7b72" font-size="11">    for</text>
  <text x="362" y="138" fill="#e6edf3" font-size="11"> event in pygame.event.get():</text>
  <text x="336" y="152" fill="#ff7b72" font-size="11">        if</text>
  <text x="368" y="152" fill="#e6edf3" font-size="11"> event.type == QUIT:</text>
  <text x="336" y="166" fill="#e6edf3" font-size="11">            running = </text><text x="442" y="166" fill="#79c0ff" font-size="11">False</text>
  <text x="336" y="180" fill="#ff7b72" font-size="11">        if</text>
  <text x="368" y="180" fill="#e6edf3" font-size="11"> K_SPACE pressed:</text>
  <text x="336" y="194" fill="#e6edf3" font-size="11">            my_player.</text><text x="432" y="194" fill="#d2a8ff" font-size="11">warp()</text>

  <line x1="336" y1="206" x2="574" y2="206" stroke="#21262d" stroke-width="1"/>

  <text x="336" y="222" fill="#8b949e" font-size="10">    # Fill background</text>
  <text x="336" y="236" fill="#e6edf3" font-size="11">    display_surface.</text><text x="456" y="236" fill="#a5d6ff" font-size="11">fill((0,0,0))</text>

  <line x1="336" y1="248" x2="574" y2="248" stroke="#21262d" stroke-width="1"/>

  <text x="336" y="264" fill="#8b949e" font-size="10">    # Player</text>
  <text x="336" y="278" fill="#e6edf3" font-size="11">    player_group.</text><text x="448" y="278" fill="#56d364" font-size="11">update()</text>
  <text x="336" y="292" fill="#e6edf3" font-size="11">    player_group.</text><text x="448" y="292" fill="#56d364" font-size="11">draw</text><text x="482" y="292" fill="#e6edf3" font-size="11">(display)</text>

  <line x1="336" y1="304" x2="574" y2="304" stroke="#21262d" stroke-width="1"/>

  <text x="336" y="320" fill="#8b949e" font-size="10">    # Monsters</text>
  <text x="336" y="334" fill="#e6edf3" font-size="11">    monster_group.</text><text x="460" y="334" fill="#f85149" font-size="11">update()</text>
  <text x="336" y="348" fill="#e6edf3" font-size="11">    monster_group.</text><text x="460" y="348" fill="#f85149" font-size="11">draw</text><text x="494" y="348" fill="#e6edf3" font-size="11">(display)</text>

  <line x1="336" y1="360" x2="574" y2="360" stroke="#21262d" stroke-width="1"/>

  <text x="336" y="376" fill="#8b949e" font-size="10">    # Game object</text>
  <text x="336" y="390" fill="#e6edf3" font-size="11">    my_game.</text><text x="412" y="390" fill="#1f6feb" font-size="11">update()   </text><text x="490" y="390" fill="#8b949e" font-size="11"># collisions</text>
  <text x="336" y="404" fill="#e6edf3" font-size="11">    my_game.</text><text x="412" y="404" fill="#1f6feb" font-size="11">draw()     </text><text x="490" y="404" fill="#8b949e" font-size="11"># HUD</text>

  <line x1="336" y1="416" x2="574" y2="416" stroke="#21262d" stroke-width="1"/>
  <text x="336" y="430" fill="#a5d6ff" font-size="11">    pygame.display.</text><text x="452" y="430" fill="#a5d6ff" font-size="11">update()</text>

  <!-- Key insights column (right) -->
  <rect x="620" y="62" width="254" height="380" rx="8" fill="#0d1117" stroke="#f8c57a" stroke-width="1.5"/>
  <rect x="620" y="62" width="254" height="24" rx="8" fill="#1c2128"/>
  <rect x="620" y="74" width="254" height="12" fill="#1c2128"/>
  <text x="747" y="78" text-anchor="middle" fill="#f8c57a" font-size="10">KEY CONCEPTS</text>

  <rect x="636" y="98" width="6" height="6" rx="1" fill="#3fb950"/>
  <text x="648" y="106" fill="#56d364" font-size="11" font-weight="bold">Draw Order Matters!</text>
  <text x="636" y="120" fill="#8b949e" font-size="10">Sprites drawn FIRST, then</text>
  <text x="636" y="133" fill="#8b949e" font-size="10">HUD drawn ON TOP. Order</text>
  <text x="636" y="146" fill="#8b949e" font-size="10">= layering on screen.</text>

  <line x1="636" y1="158" x2="858" y2="158" stroke="#21262d" stroke-width="1"/>

  <rect x="636" y="168" width="6" height="6" rx="1" fill="#1f6feb"/>
  <text x="648" y="176" fill="#79c0ff" font-size="11" font-weight="bold">Group.update() calls</text>
  <text x="648" y="188" fill="#79c0ff" font-size="11" font-weight="bold">every sprite's update()</text>
  <text x="636" y="202" fill="#8b949e" font-size="10">One call → all monsters</text>
  <text x="636" y="215" fill="#8b949e" font-size="10">move. That's the power of</text>
  <text x="636" y="228" fill="#8b949e" font-size="10">sprite groups!</text>

  <line x1="636" y1="242" x2="858" y2="242" stroke="#21262d" stroke-width="1"/>

  <rect x="636" y="252" width="6" height="6" rx="1" fill="#f85149"/>
  <text x="648" y="260" fill="#ff7b72" font-size="11" font-weight="bold">game.update() vs</text>
  <text x="648" y="272" fill="#ff7b72" font-size="11" font-weight="bold">group.update()</text>
  <text x="636" y="286" fill="#8b949e" font-size="10">game.update() handles</text>
  <text x="636" y="299" fill="#8b949e" font-size="10">GAME LOGIC (collisions,</text>
  <text x="636" y="312" fill="#8b949e" font-size="10">timer). group.update()</text>
  <text x="636" y="325" fill="#8b949e" font-size="10">handles MOVEMENT.</text>

  <line x1="636" y1="338" x2="858" y2="338" stroke="#21262d" stroke-width="1"/>

  <rect x="636" y="348" width="6" height="6" rx="1" fill="#f8c57a"/>
  <text x="648" y="356" fill="#f8c57a" font-size="11" font-weight="bold">60 FPS target</text>
  <text x="636" y="370" fill="#8b949e" font-size="10">clock.tick(FPS) at end</text>
  <text x="636" y="383" fill="#8b949e" font-size="10">throttles loop speed.</text>
  <text x="636" y="396" fill="#8b949e" font-size="10">Without it, game runs</text>
  <text x="636" y="409" fill="#8b949e" font-size="10">at CPU max speed!</text>

  <!-- Connecting arrows from setup to loop -->
  <line x1="290" y1="130" x2="320" y2="130" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arrBlue)" stroke-dasharray="4,3"/>
  <line x1="290" y1="248" x2="320" y2="248" stroke="#56d364" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="290" y1="364" x2="320" y2="390" stroke="#f8c57a" stroke-width="1.5" marker-end="url(#arrYellow)" stroke-dasharray="4,3"/>
</svg>