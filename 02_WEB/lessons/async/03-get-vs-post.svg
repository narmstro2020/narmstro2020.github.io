<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
  <defs>
    <linearGradient id="hg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
  <text x="20" y="33" font-family="'Fira Code',monospace" font-size="14" font-weight="700" fill="url(#hg3)">03 — GET vs POST</text>

  <!-- GET Column -->
  <rect x="20" y="68" width="268" height="252" rx="10" fill="#1a1a2e" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="20" y="68" width="268" height="40" rx="10" fill="rgba(79,195,247,0.12)"/>
  <rect x="20" y="98" width="268" height="10" fill="#1a1a2e"/>
  <text x="154" y="94" font-family="'Fira Code',monospace" font-size="14" font-weight="700" fill="#4fc3f7" text-anchor="middle">GET</text>

  <text x="36" y="134" font-family="'DM Sans',sans-serif" font-size="13" fill="#e2e2f0">"Give me data"</text>
  <text x="36" y="164" font-family="'DM Sans',sans-serif" font-size="12" fill="#8888aa">No body needed</text>
  <text x="36" y="184" font-family="'DM Sans',sans-serif" font-size="12" fill="#8888aa">No headers needed</text>
  <text x="36" y="204" font-family="'DM Sans',sans-serif" font-size="12" fill="#8888aa">Default method for fetch()</text>

  <rect x="36" y="222" width="236" height="82" rx="6" fill="#111125" stroke="#2e2e52"/>
  <text x="48" y="244" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#c792ea">await </tspan><tspan fill="#82aaff">fetch</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"url"</tspan><tspan fill="#e2e2f0">);</tspan>
  </text>
  <text x="48" y="268" font-family="'Fira Code',monospace" font-size="10" fill="#546e7a">// that's it!</text>
  <text x="48" y="288" font-family="'Fira Code',monospace" font-size="10" fill="#546e7a">// method defaults to "GET"</text>

  <!-- POST Column -->
  <rect x="312" y="68" width="268" height="252" rx="10" fill="#1a1a2e" stroke="#f9a825" stroke-width="1.5"/>
  <rect x="312" y="68" width="268" height="40" rx="10" fill="rgba(249,168,37,0.12)"/>
  <rect x="312" y="98" width="268" height="10" fill="#1a1a2e"/>
  <text x="446" y="94" font-family="'Fira Code',monospace" font-size="14" font-weight="700" fill="#f9a825" text-anchor="middle">POST</text>

  <text x="328" y="134" font-family="'DM Sans',sans-serif" font-size="13" fill="#e2e2f0">"Here's some data, save it"</text>
  <text x="328" y="164" font-family="'DM Sans',sans-serif" font-size="12" fill="#f9a825">✦ Requires a body</text>
  <text x="328" y="184" font-family="'DM Sans',sans-serif" font-size="12" fill="#f9a825">✦ Requires Content-Type header</text>
  <text x="328" y="204" font-family="'DM Sans',sans-serif" font-size="12" fill="#f9a825">✦ Must specify method: "POST"</text>

  <rect x="328" y="222" width="236" height="82" rx="6" fill="#111125" stroke="#2e2e52"/>
  <text x="340" y="244" font-family="'Fira Code',monospace" font-size="10">
    <tspan fill="#c792ea">await </tspan><tspan fill="#82aaff">fetch</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"url"</tspan><tspan fill="#e2e2f0">, {</tspan>
  </text>
  <text x="340" y="262" font-family="'Fira Code',monospace" font-size="10">
    <tspan fill="#4fc3f7">  method</tspan><tspan fill="#e2e2f0">: </tspan><tspan fill="#c3e88d">"POST"</tspan><tspan fill="#e2e2f0">,</tspan>
  </text>
  <text x="340" y="280" font-family="'Fira Code',monospace" font-size="10">
    <tspan fill="#4fc3f7">  headers</tspan><tspan fill="#e2e2f0">: {...}, </tspan><tspan fill="#4fc3f7">body</tspan><tspan fill="#e2e2f0">: ...</tspan>
  </text>
  <text x="340" y="298" font-family="'Fira Code',monospace" font-size="10" fill="#e2e2f0">});</text>
</svg>
