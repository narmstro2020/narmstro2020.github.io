<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
  <text x="20" y="33" font-family="'Fira Code',monospace" font-size="14" font-weight="700" fill="url(#hg)">01 — Async/Await Syntax</text>

  <!-- Before box -->
  <rect x="20" y="68" width="268" height="150" rx="8" fill="#1a1a2e" stroke="#2e2e52"/>
  <text x="32" y="90" font-family="'Fira Code',monospace" font-size="11" font-weight="600" fill="#f07178">BEFORE (.then chain)</text>

  <text x="32" y="118" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#82aaff">fetch</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"url"</tspan><tspan fill="#e2e2f0">)</tspan>
  </text>
  <text x="32" y="138" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#e2e2f0">  .</tspan><tspan fill="#82aaff">then</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#4fc3f7">r</tspan><tspan fill="#c792ea"> => </tspan><tspan fill="#4fc3f7">r</tspan><tspan fill="#e2e2f0">.</tspan><tspan fill="#82aaff">json</tspan><tspan fill="#e2e2f0">())</tspan>
  </text>
  <text x="32" y="158" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#e2e2f0">  .</tspan><tspan fill="#82aaff">then</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#4fc3f7">data</tspan><tspan fill="#c792ea"> => </tspan><tspan fill="#e2e2f0">{</tspan>
  </text>
  <text x="32" y="178" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#546e7a">    // use data</tspan>
  </text>
  <text x="32" y="198" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#e2e2f0">  });</tspan>
  </text>

  <!-- Arrow -->
  <text x="300" y="145" font-size="24" fill="#f9a825" text-anchor="middle">→</text>

  <!-- After box -->
  <rect x="312" y="68" width="268" height="150" rx="8" fill="#1a1a2e" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="324" y="90" font-family="'Fira Code',monospace" font-size="11" font-weight="600" fill="#66bb6a">AFTER (async/await)</text>

  <text x="324" y="118" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#c792ea">async function </tspan><tspan fill="#82aaff">getData</tspan><tspan fill="#e2e2f0">() {</tspan>
  </text>
  <text x="324" y="138" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#c792ea">  const </tspan><tspan fill="#4fc3f7">res</tspan><tspan fill="#e2e2f0"> = </tspan><tspan fill="#c792ea">await </tspan><tspan fill="#82aaff">fetch</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"url"</tspan><tspan fill="#e2e2f0">);</tspan>
  </text>
  <text x="324" y="158" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#c792ea">  const </tspan><tspan fill="#4fc3f7">data</tspan><tspan fill="#e2e2f0"> = </tspan><tspan fill="#c792ea">await </tspan><tspan fill="#4fc3f7">res</tspan><tspan fill="#e2e2f0">.</tspan><tspan fill="#82aaff">json</tspan><tspan fill="#e2e2f0">();</tspan>
  </text>
  <text x="324" y="178" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#546e7a">  // use data</tspan>
  </text>
  <text x="324" y="198" font-family="'Fira Code',monospace" font-size="11">
    <tspan fill="#e2e2f0">}</tspan>
  </text>

  <!-- Key points -->
  <rect x="20" y="238" width="560" height="124" rx="8" fill="#1a1a2e" stroke="#2e2e52"/>
  <text x="32" y="262" font-family="'Fira Code',monospace" font-size="11" font-weight="600" fill="#f9a825">KEY RULES</text>

  <text x="32" y="288" font-family="'DM Sans',sans-serif" font-size="13" fill="#e2e2f0">
    <tspan fill="#c792ea" font-family="'Fira Code',monospace" font-size="12">async</tspan><tspan>  — marks a function as asynchronous (required to use await)</tspan>
  </text>
  <text x="32" y="312" font-family="'DM Sans',sans-serif" font-size="13" fill="#e2e2f0">
    <tspan fill="#c792ea" font-family="'Fira Code',monospace" font-size="12">await</tspan><tspan>  — pauses until the Promise resolves, returns the value</tspan>
  </text>
  <text x="32" y="336" font-family="'DM Sans',sans-serif" font-size="13" fill="#e2e2f0">
    <tspan fill="#f9a825">⚠</tspan><tspan>  await can ONLY be used inside an async function</tspan>
  </text>
  <text x="32" y="354" font-family="'DM Sans',sans-serif" font-size="13" fill="#8888aa">Same behavior as .then() — just cleaner to read and write</text>
</svg>
