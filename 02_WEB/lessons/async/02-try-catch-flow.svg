<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
  <defs>
    <linearGradient id="hg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
  <text x="20" y="33" font-family="'Fira Code',monospace" font-size="14" font-weight="700" fill="url(#hg2)">02 — Try / Catch Flow</text>

  <!-- Flow diagram -->
  <!-- Try block -->
  <rect x="40" y="72" width="220" height="180" rx="10" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="56" y="96" font-family="'Fira Code',monospace" font-size="12" font-weight="700" fill="#66bb6a">try {</text>

  <rect x="56" y="108" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="124" font-family="'Fira Code',monospace" font-size="10" fill="#8888aa">① Set loading state</text>

  <rect x="56" y="138" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="154" font-family="'Fira Code',monospace" font-size="10" fill="#c792ea">② await fetch(url)</text>

  <rect x="56" y="168" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="184" font-family="'Fira Code',monospace" font-size="10" fill="#c792ea">③ await res.json()</text>

  <rect x="56" y="198" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="214" font-family="'Fira Code',monospace" font-size="10" fill="#82aaff">④ Render data to DOM</text>

  <text x="56" y="242" font-family="'Fira Code',monospace" font-size="12" font-weight="700" fill="#66bb6a">}</text>

  <!-- Arrow: success -->
  <line x1="260" y1="160" x2="300" y2="160" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#66bb6a"/></marker></defs>

  <!-- Success result -->
  <rect x="304" y="130" width="140" height="60" rx="8" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="374" y="155" font-family="'Fira Code',monospace" font-size="11" fill="#66bb6a" text-anchor="middle">✓ SUCCESS</text>
  <text x="374" y="175" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa" text-anchor="middle">Data rendered</text>

  <!-- Catch block -->
  <rect x="40" y="264" width="220" height="110" rx="10" fill="none" stroke="#f07178" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="56" y="288" font-family="'Fira Code',monospace" font-size="12" font-weight="700" fill="#f07178">catch (error) {</text>

  <rect x="56" y="300" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="316" font-family="'Fira Code',monospace" font-size="10" fill="#f07178">Show error.message</text>

  <rect x="56" y="330" width="188" height="24" rx="4" fill="#222240"/>
  <text x="64" y="346" font-family="'Fira Code',monospace" font-size="10" fill="#f07178">Update status = "error"</text>

  <text x="56" y="368" font-family="'Fira Code',monospace" font-size="12" font-weight="700" fill="#f07178">}</text>

  <!-- Arrow: error -->
  <line x1="260" y1="320" x2="300" y2="320" stroke="#f07178" stroke-width="2" marker-end="url(#arrowR)"/>
  <defs><marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f07178"/></marker></defs>

  <!-- Error result -->
  <rect x="304" y="290" width="140" height="60" rx="8" fill="rgba(240,113,120,0.12)" stroke="#f07178"/>
  <text x="374" y="315" font-family="'Fira Code',monospace" font-size="11" fill="#f07178" text-anchor="middle">✗ ERROR</text>
  <text x="374" y="335" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa" text-anchor="middle">User sees message</text>

  <!-- Jump arrow from try to catch -->
  <path d="M 150 252 C 150 258, 150 258, 150 264" stroke="#f9a825" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="170" y="260" font-family="'DM Sans',sans-serif" font-size="10" fill="#f9a825">if error → jumps here</text>

  <!-- Note -->
  <rect x="460" y="72" width="124" height="320" rx="8" fill="#1a1a2e" stroke="#2e2e52"/>
  <text x="476" y="96" font-family="'Fira Code',monospace" font-size="10" font-weight="600" fill="#f9a825">REMEMBER</text>
  <text x="476" y="120" font-family="'DM Sans',sans-serif" font-size="11" fill="#e2e2f0">try/catch</text>
  <text x="476" y="138" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">replaces</text>
  <text x="476" y="156" font-family="'DM Sans',sans-serif" font-size="11" fill="#e2e2f0">.catch()</text>
  <line x1="476" y1="172" x2="568" y2="172" stroke="#2e2e52"/>
  <text x="476" y="196" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">If ANY line</text>
  <text x="476" y="214" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">inside try</text>
  <text x="476" y="232" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">fails, code</text>
  <text x="476" y="250" font-family="'DM Sans',sans-serif" font-size="11" fill="#f07178">JUMPS to</text>
  <text x="476" y="268" font-family="'DM Sans',sans-serif" font-size="11" fill="#f07178">catch block</text>
  <line x1="476" y1="284" x2="568" y2="284" stroke="#2e2e52"/>
  <text x="476" y="308" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">The error</text>
  <text x="476" y="326" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">object has a</text>
  <text x="476" y="344" font-family="'Fira Code',monospace" font-size="10" fill="#4fc3f7">.message</text>
  <text x="476" y="362" font-family="'DM Sans',sans-serif" font-size="11" fill="#8888aa">property</text>
</svg>
