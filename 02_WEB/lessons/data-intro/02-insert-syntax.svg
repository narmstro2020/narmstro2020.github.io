<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
<rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
<text x="20" y="33" font-family="Fira Code,monospace" font-size="14" font-weight="700" fill="#66bb6a">02 — INSERT Syntax</text>
<rect x="40" y="80" width="520" height="80" rx="8" fill="#111125" stroke="#2e2e52"/>
<text x="60" y="115" font-family="Fira Code,monospace" font-size="14"><tspan fill="#c792ea">INSERT INTO</tspan><tspan fill="#82aaff"> students </tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#4fc3f7">name</tspan><tspan fill="#e2e2f0">, </tspan><tspan fill="#4fc3f7">grade</tspan><tspan fill="#e2e2f0">, </tspan><tspan fill="#4fc3f7">gpa</tspan><tspan fill="#e2e2f0">)</tspan></text>
<text x="60" y="145" font-family="Fira Code,monospace" font-size="14"><tspan fill="#c792ea">VALUES</tspan><tspan fill="#e2e2f0"> (</tspan><tspan fill="#c3e88d">'Jordan'</tspan><tspan fill="#e2e2f0">, </tspan><tspan fill="#f78c6c">11</tspan><tspan fill="#e2e2f0">, </tspan><tspan fill="#f78c6c">3.8</tspan><tspan fill="#e2e2f0">);</tspan></text>
<text x="60" y="200" font-family="DM Sans" font-size="12" fill="#f9a825">↑ column names match ↓ values in same order</text>
<text x="60" y="230" font-family="DM Sans" font-size="12" fill="#8888aa">• Strings use single quotes: 'Jordan'</text>
<text x="60" y="250" font-family="DM Sans" font-size="12" fill="#8888aa">• Numbers — no quotes: 11, 3.8</text>
<text x="60" y="270" font-family="DM Sans" font-size="12" fill="#8888aa">• End every statement with a semicolon ;</text>
</svg>
