<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
<rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
<text x="20" y="33" font-family="Fira Code,monospace" font-size="14" font-weight="700" fill="#f9a825">04 — WHERE Clause</text>
<rect x="40" y="80" width="520" height="80" rx="8" fill="#111125" stroke="#2e2e52"/>
<text x="60" y="115" font-family="Fira Code,monospace" font-size="13"><tspan fill="#c792ea">SELECT</tspan><tspan fill="#e2e2f0"> * </tspan><tspan fill="#c792ea">FROM</tspan><tspan fill="#82aaff"> students</tspan></text>
<text x="60" y="140" font-family="Fira Code,monospace" font-size="13"><tspan fill="#c792ea">WHERE</tspan><tspan fill="#4fc3f7"> gpa </tspan><tspan fill="#e2e2f0">&gt;= </tspan><tspan fill="#f78c6c">3.5</tspan><tspan fill="#e2e2f0">;</tspan></text>
<text x="60" y="190" font-family="DM Sans" font-size="12" fill="#f9a825" font-weight="600">COMPARISON OPERATORS</text>
<text x="60" y="215" font-family="Fira Code,monospace" font-size="12" fill="#e2e2f0">= &nbsp;!= &nbsp;&gt; &nbsp;&lt; &nbsp;&gt;= &nbsp;&lt;=</text>
<text x="60" y="250" font-family="DM Sans" font-size="12" fill="#f9a825" font-weight="600">COMBINE WITH:</text>
<text x="60" y="275" font-family="Fira Code,monospace" font-size="12"><tspan fill="#c792ea">AND</tspan><tspan fill="#e2e2f0"> — both must be true</tspan></text>
<text x="60" y="300" font-family="Fira Code,monospace" font-size="12"><tspan fill="#c792ea">OR</tspan><tspan fill="#e2e2f0"> — either can be true</tspan></text>
<text x="60" y="325" font-family="Fira Code,monospace" font-size="11" fill="#546e7a">WHERE grade = 11 AND gpa &gt; 3.0</text>
</svg>
