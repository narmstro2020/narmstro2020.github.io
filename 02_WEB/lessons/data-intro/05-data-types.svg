<text x="326" y="238" font-family="Fira Code,monospace" font-size="13" fill="#f07178">uuid</text>
<text x="326" y="254" font-family="DM Sans" font-size="11" fill="#8888aa">unique random ID</text>
<text x="40" y="295" font-family="DM Sans" font-size="12" fill="#f9a825">💡 Pick the smallest type that fits your data</text>
