<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a">
<rect x="0" y="0" width="600" height="52" fill="#1a1a2e"/>
<text x="20" y="33" font-family="Fira Code,monospace" font-size="14" font-weight="700" fill="#c792ea">05 — Common Data Types</text>
<rect x="40" y="80" width="250" height="50" rx="6" fill="#1a1a2e" stroke="#2e2e52"/>
<text x="56" y="108" font-family="Fira Code,monospace" font-size="13" fill="#c3e88d">text</text>
<text x="56" y="124" font-family="DM Sans" font-size="11" fill="#8888aa">any string of characters</text>
<rect x="310" y="80" width="250" height="50" rx="6" fill="#1a1a2e" stroke="#2e2e52"/>
<text x="326" y="108" font-family="Fira Code,monospace" font-size="13" fill="#f78c6c">int4 / int8</text>
<text x="326" y="124" font-family="DM Sans" font-size="11" fill="#8888aa">whole numbers</text>
<rect x="40" y="145" width="250" height="50" rx="6" fill="#1a1a2e" stroke="#2e2e52"/>
<text x="56" y="173" font-family="Fira Code,monospace" font-size="13" fill="#f78c6c">float4 / float8</text>
<text x="56" y="189" font-family="DM Sans" font-size="11" fill="#8888aa">decimal numbers (3.8)</text>
<rect x="310" y="145" width="250" height="50" rx="6" fill="#1a1a2e" stroke="#2e2e52"/>
<text x="326" y="173" font-family="Fira Code,monospace" font-size="13" fill="#7c6af7">bool</text>
<text x="326" y="189" font-family="DM Sans" font-size="11" fill="#8888aa">true / false</text>
<rect x="40" y="210" width="250" height="50" rx="6" fill="#1a1a2e" stroke="#2e2e52"/>
<text x="56" y="238" font-family="Fira Code,monospace" font-size="13" fill="#4fc3f7">timestamp</text>
