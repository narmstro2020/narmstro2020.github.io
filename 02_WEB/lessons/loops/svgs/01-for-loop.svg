<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" fill="url(#bg)" rx="12"/>

  <text x="300" y="35" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#4ecca3">for Loop</text>
  <line x1="100" y1="47" x2="500" y2="47" stroke="#252540" stroke-width="1"/>

  <!-- Syntax Box -->
  <rect x="30" y="60" width="540" height="80" rx="8" fill="#1a1a2e" stroke="#252540"/>
  <text x="50" y="82" font-family="monospace" font-size="11" fill="#a0a0a0">// Syntax:</text>
  <text x="50" y="105" font-family="monospace" font-size="14" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#ffc107">let i = 0</tspan>; <tspan fill="#4ecca3">i &lt; 10</tspan>; <tspan fill="#e94560">i++</tspan>) {</text>
  <text x="50" y="128" font-family="monospace" font-size="14" fill="#e0e0e0">  <tspan fill="#a0a0a0">// code runs each time</tspan></text>

  <!-- Three Parts -->
  <rect x="30" y="160" width="170" height="100" rx="8" fill="rgba(255,193,7,0.08)" stroke="rgba(255,193,7,0.3)"/>
  <text x="115" y="185" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ffc107">① Initialize</text>
  <text x="115" y="207" text-anchor="middle" font-family="monospace" font-size="12" fill="#e0e0e0">let i = 0</text>
  <text x="115" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Runs ONCE at start</text>
  <text x="115" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Sets the counter</text>

  <rect x="215" y="160" width="170" height="100" rx="8" fill="rgba(78,204,163,0.08)" stroke="rgba(78,204,163,0.3)"/>
  <text x="300" y="185" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#4ecca3">② Condition</text>
  <text x="300" y="207" text-anchor="middle" font-family="monospace" font-size="12" fill="#e0e0e0">i &lt; 10</text>
  <text x="300" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Checked BEFORE each loop</text>
  <text x="300" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">true → run, false → stop</text>

  <rect x="400" y="160" width="170" height="100" rx="8" fill="rgba(233,69,96,0.08)" stroke="rgba(233,69,96,0.3)"/>
  <text x="485" y="185" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e94560">③ Update</text>
  <text x="485" y="207" text-anchor="middle" font-family="monospace" font-size="12" fill="#e0e0e0">i++</text>
  <text x="485" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Runs AFTER each loop</text>
  <text x="485" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#a0a0a0">Changes the counter</text>

  <!-- Common Patterns -->
  <rect x="30" y="280" width="540" height="125" rx="8" fill="rgba(78,204,163,0.04)" stroke="rgba(78,204,163,0.12)"/>
  <text x="50" y="305" font-family="monospace" font-size="12" font-weight="bold" fill="#ffc107">Common Patterns:</text>

  <text x="50" y="330" font-family="monospace" font-size="11" fill="#a0a0a0">Count up:    </text>
  <text x="170" y="330" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#ffc107">let i = 0</tspan>; i &lt; <tspan fill="#ffc107">5</tspan>; i++)     → 0,1,2,3,4</text>

  <text x="50" y="355" font-family="monospace" font-size="11" fill="#a0a0a0">Count down:  </text>
  <text x="170" y="355" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#ffc107">let i = 5</tspan>; i &gt; <tspan fill="#ffc107">0</tspan>; i--)     → 5,4,3,2,1</text>

  <text x="50" y="380" font-family="monospace" font-size="11" fill="#a0a0a0">By twos:     </text>
  <text x="170" y="380" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#ffc107">let i = 0</tspan>; i &lt;= <tspan fill="#ffc107">10</tspan>; i+=<tspan fill="#ffc107">2</tspan>) → 0,2,4,6,8,10</text>
</svg>
