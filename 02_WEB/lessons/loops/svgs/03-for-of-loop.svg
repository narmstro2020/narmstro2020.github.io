<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" fill="url(#bg)" rx="12"/>

  <text x="300" y="35" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#ffc107">for...of Loop</text>
  <line x1="100" y1="47" x2="500" y2="47" stroke="#252540" stroke-width="1"/>

  <!-- Syntax Box -->
  <rect x="30" y="60" width="540" height="80" rx="8" fill="#1a1a2e" stroke="#252540"/>
  <text x="50" y="82" font-family="monospace" font-size="11" fill="#a0a0a0">// Syntax:</text>
  <text x="50" y="105" font-family="monospace" font-size="14" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#7b68ee">const</tspan> <tspan fill="#ffc107">item</tspan> <tspan fill="#7b68ee">of</tspan> <tspan fill="#4ecca3">array</tspan>) {</text>
  <text x="50" y="128" font-family="monospace" font-size="14" fill="#e0e0e0">  <tspan fill="#a0a0a0">// use item directly — no index needed!</tspan></text>

  <!-- Visual: Array being iterated -->
  <rect x="30" y="160" width="540" height="100" rx="8" fill="rgba(255,193,7,0.06)" stroke="rgba(255,193,7,0.2)"/>
  <text x="50" y="185" font-family="monospace" font-size="11" font-weight="bold" fill="#ffc107">How It Works:</text>

  <text x="50" y="210" font-family="monospace" font-size="11" fill="#a0a0a0">Array:</text>
  <!-- Array boxes -->
  <rect x="120" y="195" width="80" height="28" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="160" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecca3">"apple"</text>

  <rect x="210" y="195" width="85" height="28" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="252" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecca3">"banana"</text>

  <rect x="305" y="195" width="85" height="28" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="347" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecca3">"cherry"</text>

  <!-- Arrow showing current -->
  <text x="50" y="245" font-family="monospace" font-size="11" fill="#a0a0a0">Each pass:</text>
  <text x="140" y="245" font-family="monospace" font-size="11" fill="#e0e0e0">item = <tspan fill="#ffc107">"apple"</tspan> → item = <tspan fill="#ffc107">"banana"</tspan> → item = <tspan fill="#ffc107">"cherry"</tspan></text>

  <!-- Example with Strings -->
  <rect x="30" y="275" width="260" height="130" rx="8" fill="#1a1a2e" stroke="#252540"/>
  <text x="50" y="297" font-family="monospace" font-size="11" fill="#a0a0a0">// Looping strings:</text>
  <text x="50" y="317" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">const</tspan> fruits = [<tspan fill="#4ecca3">"🍎"</tspan>,<tspan fill="#4ecca3">"🍌"</tspan>,<tspan fill="#4ecca3">"🍒"</tspan>];</text>
  <text x="50" y="340" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#7b68ee">const</tspan> f <tspan fill="#7b68ee">of</tspan> fruits) {</text>
  <text x="50" y="360" font-family="monospace" font-size="11" fill="#e0e0e0">  console.log(f);</text>
  <text x="50" y="380" font-family="monospace" font-size="11" fill="#e0e0e0">}</text>
  <text x="50" y="397" font-family="monospace" font-size="9" fill="#a0a0a0">// 🍎  🍌  🍒</text>

  <!-- Example with Numbers (summing) -->
  <rect x="310" y="275" width="260" height="130" rx="8" fill="#1a1a2e" stroke="#252540"/>
  <text x="330" y="297" font-family="monospace" font-size="11" fill="#a0a0a0">// Summing numbers:</text>
  <text x="330" y="317" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">const</tspan> nums = [<tspan fill="#ffc107">10</tspan>,<tspan fill="#ffc107">20</tspan>,<tspan fill="#ffc107">30</tspan>];</text>
  <text x="330" y="340" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">let</tspan> sum = <tspan fill="#ffc107">0</tspan>;</text>
  <text x="330" y="360" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#7b68ee">const</tspan> n <tspan fill="#7b68ee">of</tspan> nums) {</text>
  <text x="330" y="380" font-family="monospace" font-size="11" fill="#e0e0e0">  sum += n;</text>
  <text x="330" y="397" font-family="monospace" font-size="9" fill="#a0a0a0">// sum → 60</text>
</svg>
