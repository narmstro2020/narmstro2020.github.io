<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)" rx="12"/>

  <text x="300" y="35" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#e94560">DOM + Loops Pattern</text>
  <line x1="80" y1="47" x2="520" y2="47" stroke="#252540" stroke-width="1"/>
  <text x="300" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0a0">The Loop → Create → Append pattern for dynamic content</text>

  <!-- Step 1: Data -->
  <rect x="30" y="85" width="540" height="55" rx="8" fill="rgba(255,193,7,0.08)" stroke="rgba(255,193,7,0.25)"/>
  <text x="50" y="105" font-family="monospace" font-size="11" font-weight="bold" fill="#ffc107">① Start with Data</text>
  <text x="50" y="128" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">const</tspan> items = [<tspan fill="#4ecca3">"Apple"</tspan>, <tspan fill="#4ecca3">"Banana"</tspan>, <tspan fill="#4ecca3">"Cherry"</tspan>];</text>

  <!-- Arrow -->
  <text x="300" y="155" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">↓</text>

  <!-- Step 2: Select Container -->
  <rect x="30" y="165" width="540" height="55" rx="8" fill="rgba(78,204,163,0.08)" stroke="rgba(78,204,163,0.25)"/>
  <text x="50" y="185" font-family="monospace" font-size="11" font-weight="bold" fill="#4ecca3">② Select the Container</text>
  <text x="50" y="208" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">const</tspan> list = document.<tspan fill="#5dade2">querySelector</tspan>(<tspan fill="#4ecca3">'#list'</tspan>);</text>

  <!-- Arrow -->
  <text x="300" y="235" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">↓</text>

  <!-- Step 3: Loop → Create → Append -->
  <rect x="30" y="245" width="540" height="135" rx="8" fill="rgba(123,104,238,0.08)" stroke="rgba(123,104,238,0.25)"/>
  <text x="50" y="265" font-family="monospace" font-size="11" font-weight="bold" fill="#7b68ee">③ Loop → Create → Append</text>

  <text x="50" y="290" font-family="monospace" font-size="11" fill="#e0e0e0"><tspan fill="#7b68ee">for</tspan> (<tspan fill="#7b68ee">const</tspan> item <tspan fill="#7b68ee">of</tspan> items) {</text>
  <text x="50" y="312" font-family="monospace" font-size="11" fill="#e0e0e0">  <tspan fill="#7b68ee">const</tspan> div = document.<tspan fill="#5dade2">createElement</tspan>(<tspan fill="#4ecca3">'div'</tspan>);  <tspan fill="#a0a0a0">// Create</tspan></text>
  <text x="50" y="334" font-family="monospace" font-size="11" fill="#e0e0e0">  div.textContent = item;                    <tspan fill="#a0a0a0">// Configure</tspan></text>
  <text x="50" y="356" font-family="monospace" font-size="11" fill="#e0e0e0">  list.<tspan fill="#5dade2">appendChild</tspan>(div);                    <tspan fill="#a0a0a0">// Append</tspan></text>
  <text x="50" y="375" font-family="monospace" font-size="11" fill="#e0e0e0">}</text>

  <!-- Result -->
  <text x="300" y="398" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">↓</text>

  <rect x="30" y="405" width="540" height="35" rx="8" fill="rgba(233,69,96,0.08)" stroke="rgba(233,69,96,0.25)"/>
  <text x="50" y="427" font-family="monospace" font-size="11" font-weight="bold" fill="#e94560">④ Result:</text>
  <rect x="180" y="412" width="65" height="22" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="212" y="427" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecca3">Apple</text>
  <rect x="255" y="412" width="75" height="22" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="292" y="427" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecca3">Banana</text>
  <rect x="340" y="412" width="70" height="22" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="375" y="427" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecca3">Cherry</text>
  <text x="430" y="427" font-family="monospace" font-size="9" fill="#a0a0a0">← in the DOM!</text>
</svg>
