<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" fill="url(#bg)" rx="12"/>

  <text x="300" y="35" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#7b68ee">while Loop</text>
  <line x1="100" y1="47" x2="500" y2="47" stroke="#252540" stroke-width="1"/>

  <!-- Syntax Box -->
  <rect x="30" y="60" width="540" height="100" rx="8" fill="#1a1a2e" stroke="#252540"/>
  <text x="50" y="82" font-family="monospace" font-size="11" fill="#a0a0a0">// Syntax:</text>
  <text x="50" y="105" font-family="monospace" font-size="14" fill="#e0e0e0"><tspan fill="#7b68ee">let</tspan> count = <tspan fill="#ffc107">0</tspan>;</text>
  <text x="50" y="128" font-family="monospace" font-size="14" fill="#e0e0e0"><tspan fill="#7b68ee">while</tspan> (<tspan fill="#4ecca3">count &lt; 5</tspan>) {</text>
  <text x="50" y="148" font-family="monospace" font-size="14" fill="#e0e0e0">  count++;  <tspan fill="#a0a0a0">// ⚠️ MUST update or infinite loop!</tspan></text>

  <!-- Flow Diagram -->
  <rect x="30" y="175" width="250" height="230" rx="8" fill="rgba(123,104,238,0.06)" stroke="rgba(123,104,238,0.2)"/>
  <text x="155" y="198" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7b68ee">Flow Diagram</text>

  <!-- Start -->
  <rect x="110" y="210" width="90" height="24" rx="12" fill="rgba(78,204,163,0.2)" stroke="#4ecca3"/>
  <text x="155" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecca3">Start</text>

  <!-- Arrow down -->
  <line x1="155" y1="234" x2="155" y2="250" stroke="#555" stroke-width="1.5"/>
  <polygon points="155,256 150,250 160,250" fill="#555"/>

  <!-- Diamond -->
  <polygon points="155,260 210,282 155,304 100,282" fill="none" stroke="#ffc107" stroke-width="1.5"/>
  <text x="155" y="286" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffc107">cond?</text>

  <!-- True arrow -->
  <line x1="210" y1="282" x2="240" y2="282" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="245" y="276" font-family="monospace" font-size="9" fill="#4ecca3">true</text>
  <rect x="240" y="272" width="24" height="20" rx="4" fill="rgba(78,204,163,0.15)" stroke="#4ecca3"/>
  <text x="252" y="286" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ecca3">{ }</text>

  <!-- Loop back arrow -->
  <line x1="264" y1="282" x2="264" y2="252" stroke="#4ecca3" stroke-width="1" stroke-dasharray="3"/>
  <line x1="264" y1="252" x2="155" y2="252" stroke="#4ecca3" stroke-width="1" stroke-dasharray="3"/>

  <!-- False arrow -->
  <line x1="155" y1="304" x2="155" y2="330" stroke="#e94560" stroke-width="1.5"/>
  <text x="165" y="320" font-family="monospace" font-size="9" fill="#e94560">false</text>

  <!-- End -->
  <rect x="110" y="330" width="90" height="24" rx="12" fill="rgba(233,69,96,0.2)" stroke="#e94560"/>
  <text x="155" y="346" text-anchor="middle" font-family="monospace" font-size="10" fill="#e94560">Done</text>

  <!-- Right side: Key Points -->
  <rect x="300" y="175" width="270" height="230" rx="8" fill="rgba(233,69,96,0.04)" stroke="rgba(233,69,96,0.15)"/>
  <text x="320" y="198" font-family="monospace" font-size="11" font-weight="bold" fill="#ffc107">Key Points:</text>

  <text x="320" y="225" font-family="monospace" font-size="10" fill="#4ecca3">✓</text>
  <text x="340" y="225" font-family="monospace" font-size="10" fill="#e0e0e0">Condition checked FIRST</text>

  <text x="320" y="250" font-family="monospace" font-size="10" fill="#4ecca3">✓</text>
  <text x="340" y="250" font-family="monospace" font-size="10" fill="#e0e0e0">Use when # of loops unknown</text>

  <text x="320" y="275" font-family="monospace" font-size="10" fill="#4ecca3">✓</text>
  <text x="340" y="275" font-family="monospace" font-size="10" fill="#e0e0e0">Great for "keep going until..."</text>

  <text x="320" y="310" font-family="monospace" font-size="10" fill="#e94560">⚠</text>
  <text x="340" y="310" font-family="monospace" font-size="10" fill="#e94560">ALWAYS update your variable!</text>

  <text x="320" y="335" font-family="monospace" font-size="10" fill="#e94560">⚠</text>
  <text x="340" y="335" font-family="monospace" font-size="10" fill="#e94560">Forgetting = infinite loop</text>

  <!-- Example -->
  <rect x="320" y="355" width="230" height="38" rx="6" fill="#1a1a2e" stroke="#252540"/>
  <text x="335" y="370" font-family="monospace" font-size="9" fill="#a0a0a0">// "Roll until you get a 6"</text>
  <text x="335" y="385" font-family="monospace" font-size="9" fill="#e0e0e0"><tspan fill="#7b68ee">while</tspan> (roll !== <tspan fill="#ffc107">6</tspan>) { roll(); }</text>
</svg>
