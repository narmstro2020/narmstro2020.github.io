<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'DM Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9a825"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="url(#bg)" rx="14"/>
  <rect x="0" y="0" width="800" height="54" fill="#1a1a2e" rx="14"/>
  <rect x="0" y="40" width="800" height="14" fill="#1a1a2e"/>
  <text x="28" y="34" fill="#e2e2f0" font-size="18" font-weight="700">What Is an API?</text>
  <rect x="696" y="14" width="84" height="24" fill="rgba(249,168,37,0.15)" rx="12"/>
  <text x="738" y="31" fill="#f9a825" font-size="11" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">Unit 04</text>

  <text x="28" y="78" fill="#8888aa" font-size="11" font-weight="700" font-family="'Fira Code',monospace">THE RESTAURANT ANALOGY</text>

  <!-- Your Code -->
  <rect x="28" y="88" width="128" height="72" fill="#1a2a3a" rx="10" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="92" y="118" font-size="24" text-anchor="middle">🧑‍💻</text>
  <text x="92" y="140" fill="#4fc3f7" font-size="13" font-weight="700" text-anchor="middle">Your Code</text>
  <text x="92" y="155" fill="#8888aa" font-size="10" text-anchor="middle">(the customer)</text>

  <line x1="156" y1="124" x2="194" y2="124" stroke="#f9a825" stroke-width="2" marker-end="url(#arrY)"/>
  <text x="175" y="117" fill="#f9a825" font-size="10" font-family="'Fira Code',monospace" text-anchor="middle">request</text>

  <!-- API -->
  <rect x="195" y="88" width="128" height="72" fill="#1a2a1a" rx="10" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="259" y="118" font-size="24" text-anchor="middle">📋</text>
  <text x="259" y="140" fill="#66bb6a" font-size="13" font-weight="700" text-anchor="middle">API</text>
  <text x="259" y="155" fill="#8888aa" font-size="10" text-anchor="middle">(the menu / rules)</text>

  <line x1="323" y1="124" x2="361" y2="124" stroke="#f9a825" stroke-width="2" marker-end="url(#arrY)"/>
  <text x="342" y="117" fill="#f9a825" font-size="10" font-family="'Fira Code',monospace" text-anchor="middle">order</text>

  <!-- Server -->
  <rect x="362" y="88" width="128" height="72" fill="#2a1a2a" rx="10" stroke="#c792ea" stroke-width="1.5"/>
  <text x="426" y="118" font-size="24" text-anchor="middle">🖥️</text>
  <text x="426" y="140" fill="#c792ea" font-size="13" font-weight="700" text-anchor="middle">Server</text>
  <text x="426" y="155" fill="#8888aa" font-size="10" text-anchor="middle">(the kitchen)</text>

  <!-- Return arrow -->
  <line x1="426" y1="160" x2="426" y2="194" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="92"  y1="194" x2="426" y2="194" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="92"  y1="160" x2="92"  y2="190" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="259" y="189" fill="#4fc3f7" font-size="10" font-family="'Fira Code',monospace" text-anchor="middle">JSON data (the food)</text>

  <!-- Key point -->
  <rect x="520" y="88" width="252" height="84" fill="#1a1a2e" rx="10" stroke="#2e2e52"/>
  <text x="536" y="110" fill="#8888aa" font-size="10" font-weight="700" font-family="'Fira Code',monospace">KEY POINT</text>
  <text x="536" y="132" fill="#e2e2f0" font-size="13">You don't need to know</text>
  <text x="536" y="150" fill="#e2e2f0" font-size="13">how the kitchen works —</text>
  <text x="536" y="168" fill="#f9a825" font-size="13" font-weight="700">just what to order.</text>

  <!-- JSON Format -->
  <rect x="28" y="216" width="364" height="186" fill="#111125" rx="10" stroke="#2e2e52"/>
  <text x="44" y="238" fill="#8888aa" font-size="11" font-weight="700" font-family="'Fira Code',monospace">JSON — WHAT APIS RETURN</text>
  <text x="44" y="262" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#e2e2f0">{</tspan></text>
  <text x="60" y="280" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#c3e88d">"id"</tspan><tspan fill="#e2e2f0">: </tspan><tspan fill="#f78c6c">1</tspan><tspan fill="#e2e2f0">,</tspan></text>
  <text x="60" y="298" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#c3e88d">"name"</tspan><tspan fill="#e2e2f0">: </tspan><tspan fill="#c3e88d">"Leanne Graham"</tspan><tspan fill="#e2e2f0">,</tspan></text>
  <text x="60" y="316" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#c3e88d">"email"</tspan><tspan fill="#e2e2f0">: </tspan><tspan fill="#c3e88d">"sincere@april.biz"</tspan><tspan fill="#e2e2f0">,</tspan></text>
  <text x="60" y="334" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#c3e88d">"company"</tspan><tspan fill="#e2e2f0">: {</tspan></text>
  <text x="76" y="352" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#c3e88d">"name"</tspan><tspan fill="#e2e2f0">: </tspan><tspan fill="#c3e88d">"Romaguera-Crona"</tspan></text>
  <text x="60" y="370" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#e2e2f0">}</tspan></text>
  <text x="44" y="388" font-family="'Fira Code',monospace" font-size="13"><tspan fill="#e2e2f0">}</tspan></text>

  <!-- JSON vs JS Object -->
  <rect x="408" y="216" width="364" height="186" fill="#1a1a2e" rx="10" stroke="#2e2e52"/>
  <text x="424" y="238" fill="#8888aa" font-size="11" font-weight="700" font-family="'Fira Code',monospace">JSON vs JS OBJECT — 2 DIFFERENCES</text>

  <rect x="420" y="250" width="340" height="58" fill="#222240" rx="6"/>
  <text x="436" y="270" fill="#f9a825" font-size="12" font-weight="700">1. Keys must be in double quotes</text>
  <text x="436" y="292" font-family="'Fira Code',monospace" font-size="12">
    <tspan fill="#c3e88d">"name"</tspan><tspan fill="#66bb6a"> ✓  </tspan><tspan fill="#f07178">name</tspan><tspan fill="#f07178"> ✗  </tspan><tspan fill="#f07178">'name'</tspan><tspan fill="#f07178"> ✗</tspan>
  </text>

  <rect x="420" y="318" width="340" height="74" fill="#222240" rx="6"/>
  <text x="436" y="338" fill="#f9a825" font-size="12" font-weight="700">2. No functions or undefined</text>
  <text x="436" y="358" fill="#8888aa" font-size="12">Valid types only:</text>
  <text x="436" y="376" fill="#8888aa" font-size="12">string, number, boolean, null, array, object</text>

  <text x="424" y="412" fill="#546e7a" font-size="11" font-family="'Fira Code',monospace">// JSON is a text format — .json() converts it to a JS object</text>
</svg>
