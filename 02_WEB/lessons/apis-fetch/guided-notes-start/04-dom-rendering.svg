<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'DM Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c6af7"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="14"/>
  <rect x="0" y="0" width="800" height="54" fill="#1a1a2e" rx="14"/>
  <rect x="0" y="40" width="800" height="14" fill="#1a1a2e"/>
  <text x="28" y="34" fill="#e2e2f0" font-size="18" font-weight="700">Rendering API Data to the DOM</text>

  <!-- Step labels -->
  <text x="55"  y="74" fill="#7c6af7" font-size="10" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">STEP 1</text>
  <text x="205" y="74" fill="#7c6af7" font-size="10" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">STEP 2</text>
  <text x="370" y="74" fill="#7c6af7" font-size="10" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">STEP 3</text>
  <text x="545" y="74" fill="#7c6af7" font-size="10" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">STEP 4</text>
  <text x="710" y="74" fill="#7c6af7" font-size="10" font-weight="700" font-family="'Fira Code',monospace" text-anchor="middle">STEP 5</text>

  <!-- Step 1: fetch -->
  <rect x="16"  y="82" width="80" height="52" fill="#1a2a3a" rx="8" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="56"  y="103" fill="#7c6af7" font-size="11" font-weight="700" text-anchor="middle">fetch(url)</text>
  <text x="56"  y="120" fill="#8888aa" font-size="10" text-anchor="middle">send request</text>

  <line x1="96" y1="108" x2="128" y2="108" stroke="#7c6af7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: first then -->
  <rect x="129" y="82" width="118" height="52" fill="#1a2a1a" rx="8" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="188" y="100" fill="#7c6af7" font-size="10" font-weight="700" text-anchor="middle">.then(res =&gt;</text>
  <text x="188" y="115" fill="#82aaff" font-size="11" text-anchor="middle" font-family="'Fira Code',monospace">res.json())</text>
  <text x="188" y="128" fill="#8888aa" font-size="10" text-anchor="middle">parse body</text>

  <line x1="247" y1="108" x2="292" y2="108" stroke="#7c6af7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: forEach -->
  <rect x="293" y="82" width="138" height="52" fill="#1a1a2e" rx="8" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="362" y="100" fill="#7c6af7" font-size="10" font-weight="700" text-anchor="middle">.then(data =&gt; {</text>
  <text x="362" y="115" fill="#82aaff" font-size="11" text-anchor="middle" font-family="'Fira Code',monospace">forEach loop</text>
  <text x="362" y="128" fill="#8888aa" font-size="10" text-anchor="middle">build html string</text>

  <line x1="431" y1="108" x2="476" y2="108" stroke="#7c6af7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: innerHTML -->
  <rect x="477" y="82" width="138" height="52" fill="#1a1a2e" rx="8" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="546" y="100" fill="#7c6af7" font-size="10" font-weight="700" text-anchor="middle">container</text>
  <text x="546" y="115" fill="#82aaff" font-size="11" text-anchor="middle" font-family="'Fira Code',monospace">.innerHTML = html</text>
  <text x="546" y="128" fill="#8888aa" font-size="10" text-anchor="middle">inject into DOM</text>

  <line x1="615" y1="108" x2="656" y2="108" stroke="#7c6af7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Cards visible -->
  <rect x="657" y="82" width="120" height="52" fill="#1a2a1a" rx="8" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="717" y="103" fill="#66bb6a" font-size="12" font-weight="700" text-anchor="middle">Cards visible</text>
  <text x="717" y="120" fill="#8888aa" font-size="10" text-anchor="middle">in browser ✓</text>

  <!-- Code block -->
  <rect x="28" y="150" width="440" height="236" fill="#111125" rx="10" stroke="#2e2e52"/>
  <text x="44" y="172" fill="#8888aa" font-size="11" font-weight="700" font-family="'Fira Code',monospace">FULL PATTERN</text>

  <text x="44" y="196" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#82aaff">fetch</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"https://...typicode.com/users"</tspan><tspan fill="#e2e2f0">)</tspan>
  </text>
  <text x="44" y="216" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">  .</tspan><tspan fill="#82aaff">then</tspan><tspan fill="#e2e2f0">(res =&gt; res.</tspan><tspan fill="#82aaff">json</tspan><tspan fill="#e2e2f0">())</tspan>
  </text>
  <text x="44" y="236" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">  .</tspan><tspan fill="#82aaff">then</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#4fc3f7">users</tspan><tspan fill="#e2e2f0"> =&gt; {</tspan>
  </text>
  <text x="44" y="256" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">    </tspan><tspan fill="#c792ea">const</tspan><tspan fill="#e2e2f0"> </tspan><tspan fill="#4fc3f7">grid</tspan><tspan fill="#e2e2f0"> = document.</tspan><tspan fill="#82aaff">querySelector</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#c3e88d">"#grid"</tspan><tspan fill="#e2e2f0">);</tspan>
  </text>
  <text x="44" y="276" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">    </tspan><tspan fill="#c792ea">let</tspan><tspan fill="#e2e2f0"> </tspan><tspan fill="#4fc3f7">html</tspan><tspan fill="#e2e2f0"> = </tspan><tspan fill="#c3e88d">""</tspan><tspan fill="#e2e2f0">;</tspan>
  </text>
  <text x="44" y="296" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">    </tspan><tspan fill="#4fc3f7">users</tspan><tspan fill="#e2e2f0">.</tspan><tspan fill="#82aaff">forEach</tspan><tspan fill="#e2e2f0">(</tspan><tspan fill="#4fc3f7">user</tspan><tspan fill="#e2e2f0"> =&gt; {</tspan>
  </text>
  <text x="44" y="316" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">      </tspan><tspan fill="#4fc3f7">html</tspan><tspan fill="#e2e2f0"> += </tspan><tspan fill="#c3e88d">`&lt;div&gt;${</tspan><tspan fill="#4fc3f7">user</tspan><tspan fill="#c3e88d">.name}&lt;/div&gt;`</tspan><tspan fill="#e2e2f0">;</tspan>
  </text>
  <text x="44" y="336" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">    });</tspan>
  </text>
  <text x="44" y="356" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">    </tspan><tspan fill="#4fc3f7">grid</tspan><tspan fill="#e2e2f0">.</tspan><tspan fill="#4fc3f7">innerHTML</tspan><tspan fill="#e2e2f0"> = html;</tspan>
  </text>
  <text x="44" y="376" font-family="'Fira Code',monospace" font-size="13">
    <tspan fill="#e2e2f0">  });</tspan>
  </text>

  <!-- Right notes -->
  <rect x="488" y="150" width="284" height="236" fill="#1a1a2e" rx="10" stroke="#2e2e52"/>
  <text x="504" y="172" fill="#8888aa" font-size="11" font-weight="700" font-family="'Fira Code',monospace">KEY NOTES</text>

  <rect x="500" y="184" width="260" height="46" fill="#222240" rx="6"/>
  <text x="516" y="203" fill="#f9a825" font-size="12" font-weight="700">Same pattern as last unit</text>
  <text x="516" y="221" fill="#8888aa" font-size="12">forEach → build html → inject</text>

  <rect x="500" y="240" width="260" height="46" fill="#222240" rx="6"/>
  <text x="516" y="259" fill="#4fc3f7" font-size="12" font-weight="700">Render inside the 2nd .then()</text>
  <text x="516" y="277" fill="#8888aa" font-size="12">data is only available there</text>

  <rect x="500" y="296" width="260" height="46" fill="#222240" rx="6"/>
  <text x="516" y="315" fill="#66bb6a" font-size="12" font-weight="700">Array → forEach to loop</text>
  <text x="516" y="333" fill="#8888aa" font-size="12">Single object → dot notation only</text>

  <rect x="500" y="352" width="260" height="28" fill="rgba(124,106,247,0.1)" rx="6" stroke="rgba(124,106,247,0.3)"/>
  <text x="630" y="371" fill="#7c6af7" font-size="12" font-weight="700" text-anchor="middle">Select → Fetch → Loop → Inject</text>
</svg>
