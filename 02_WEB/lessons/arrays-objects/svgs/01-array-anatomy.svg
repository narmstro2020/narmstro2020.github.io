<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
  </defs>
  <!-- BG -->
  <rect width="600" height="360" rx="14" fill="#0f0f1a"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#252540" stroke-width="1.5"/>

  <!-- Title -->
  <text x="30" y="40" font-family="Fira Code, monospace" font-size="13" font-weight="700" fill="url(#titleGrad)">01 — Array Anatomy</text>

  <!-- Array declaration -->
  <text x="30" y="80" font-family="Fira Code, monospace" font-size="12" fill="#7b68ee">const</text>
  <text x="80" y="80" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0"> colors = [</text>
  <text x="190" y="80" font-family="Fira Code, monospace" font-size="12" fill="#4ecca3">'red'</text>
  <text x="232" y="80" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0">, </text>
  <text x="245" y="80" font-family="Fira Code, monospace" font-size="12" fill="#4ecca3">'green'</text>
  <text x="303" y="80" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0">, </text>
  <text x="316" y="80" font-family="Fira Code, monospace" font-size="12" fill="#4ecca3">'blue'</text>
  <text x="358" y="80" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0">];</text>

  <!-- Index boxes -->
  <!-- Box 0 -->
  <rect x="30" y="105" width="120" height="70" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="90" y="130" font-family="Fira Code, monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">index</text>
  <text x="90" y="147" font-family="Fira Code, monospace" font-size="18" font-weight="700" fill="#ffc107" text-anchor="middle">0</text>
  <text x="90" y="166" font-family="Fira Code, monospace" font-size="11" fill="#4ecca3" text-anchor="middle">'red'</text>

  <!-- Box 1 -->
  <rect x="170" y="105" width="120" height="70" rx="8" fill="#1a1a2e" stroke="#7b68ee" stroke-width="1.5"/>
  <text x="230" y="130" font-family="Fira Code, monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">index</text>
  <text x="230" y="147" font-family="Fira Code, monospace" font-size="18" font-weight="700" fill="#ffc107" text-anchor="middle">1</text>
  <text x="230" y="166" font-family="Fira Code, monospace" font-size="11" fill="#4ecca3" text-anchor="middle">'green'</text>

  <!-- Box 2 -->
  <rect x="310" y="105" width="120" height="70" rx="8" fill="#1a1a2e" stroke="#5dade2" stroke-width="1.5"/>
  <text x="370" y="130" font-family="Fira Code, monospace" font-size="11" fill="#a0a0a0" text-anchor="middle">index</text>
  <text x="370" y="147" font-family="Fira Code, monospace" font-size="18" font-weight="700" fill="#ffc107" text-anchor="middle">2</text>
  <text x="370" y="166" font-family="Fira Code, monospace" font-size="11" fill="#4ecca3" text-anchor="middle">'blue'</text>

  <!-- Length callout -->
  <rect x="450" y="105" width="120" height="70" rx="8" fill="#252540" stroke="#ff8c42" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="510" y="130" font-family="Fira Code, monospace" font-size="10" fill="#a0a0a0" text-anchor="middle">.length</text>
  <text x="510" y="152" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#ff8c42" text-anchor="middle">3</text>
  <text x="510" y="169" font-family="Fira Code, monospace" font-size="9" fill="#555" text-anchor="middle">not 2!</text>

  <!-- Access syntax -->
  <rect x="30" y="200" width="540" height="44" rx="8" fill="#1a1a2e" stroke="#252540" stroke-width="1"/>
  <text x="50" y="224" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0">colors[<text font-family="Fira Code, monospace" font-size="12" fill="#ffc107">0</text>]  →  <text font-family="Fira Code, monospace" font-size="12" fill="#4ecca3">'red'</text>      colors[<text font-family="Fira Code, monospace" font-size="12" fill="#ffc107">2</text>]  →  <text font-family="Fira Code, monospace" font-size="12" fill="#4ecca3">'blue'</text></text>

  <!-- Key rules -->
  <text x="30" y="272" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0">● Indexes start at <tspan font-family="Fira Code, monospace" fill="#ffc107">0</tspan>, not 1</text>
  <text x="30" y="292" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0">● Last index = <tspan font-family="Fira Code, monospace" fill="#ff8c42">.length - 1</tspan></text>
  <text x="30" y="312" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0">● Arrays can hold any data type: strings, numbers, booleans, objects</text>
  <text x="30" y="332" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0">● <tspan font-family="Fira Code, monospace" fill="#7b68ee">const</tspan> array = you can't reassign the variable, but CAN mutate contents</text>
</svg>
