<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="14" fill="#0f0f1a"/>
  <rect x="1" y="1" width="598" height="398" rx="13" fill="none" stroke="#252540" stroke-width="1.5"/>

  <text x="30" y="40" font-family="Fira Code, monospace" font-size="13" font-weight="700" fill="url(#titleGrad)">03 — forEach · map · filter</text>
  <text x="30" y="62" font-family="Fira Code, monospace" font-size="11" fill="#555">const scores = [88, 72, 95, 61, 83];</text>

  <!-- forEach -->
  <rect x="30" y="80" width="540" height="80" rx="8" fill="#1a1a2e" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="50" y="102" font-family="Fira Code, monospace" font-size="12" fill="#e0e0e0" font-weight="700">forEach</text>
  <text x="130" y="102" font-family="DM Sans, sans-serif" font-size="11" fill="#555"> — loop and DO something. Returns nothing.</text>
  <text x="50" y="122" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">scores.<tspan fill="#5dade2">forEach</tspan>(s =&gt; console.log(s))</text>
  <text x="50" y="142" font-family="Fira Code, monospace" font-size="10" fill="#555">→ 88  72  95  61  83  (no new array returned)</text>
  <text x="470" y="102" font-family="DM Sans, sans-serif" font-size="10" fill="#7b68ee" text-anchor="middle">ITERATE</text>

  <!-- map -->
  <rect x="30" y="175" width="540" height="80" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="50" y="197" font-family="Fira Code, monospace" font-size="12" fill="#4ecca3" font-weight="700">map</text>
  <text x="80" y="197" font-family="DM Sans, sans-serif" font-size="11" fill="#555"> — transform each item. Returns a NEW array of same length.</text>
  <text x="50" y="217" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">const boosted = scores.<tspan fill="#4ecca3">map</tspan>(s =&gt; s + <tspan fill="#ffc107">5</tspan>)</text>
  <text x="50" y="237" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [</text><text x="68" y="237" font-family="Fira Code, monospace" font-size="10" fill="#4ecca3">93, 77, 100, 66, 88</text><text x="228" y="237" font-family="Fira Code, monospace" font-size="10" fill="#555">]  ← NEW array, original unchanged</text>
  <text x="493" y="197" font-family="DM Sans, sans-serif" font-size="10" fill="#4ecca3" text-anchor="middle">TRANSFORM</text>

  <!-- filter -->
  <rect x="30" y="270" width="540" height="80" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="50" y="292" font-family="Fira Code, monospace" font-size="12" fill="#e94560" font-weight="700">filter</text>
  <text x="92" y="292" font-family="DM Sans, sans-serif" font-size="11" fill="#555"> — keep items that pass a test. Returns a NEW array (shorter or same).</text>
  <text x="50" y="312" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">const passing = scores.<tspan fill="#e94560">filter</tspan>(s =&gt; s &gt;= <tspan fill="#ffc107">80</tspan>)</text>
  <text x="50" y="332" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [</text><text x="68" y="332" font-family="Fira Code, monospace" font-size="10" fill="#e94560">88, 95, 83</text><text x="142" y="332" font-family="Fira Code, monospace" font-size="10" fill="#555">]  ← only items where condition was true</text>
  <text x="493" y="292" font-family="DM Sans, sans-serif" font-size="10" fill="#e94560" text-anchor="middle">SELECT</text>

  <!-- key point -->
  <text x="30" y="372" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0">💡 <tspan font-family="Fira Code, monospace" fill="#4ecca3">map</tspan> and <tspan font-family="Fira Code, monospace" fill="#e94560">filter</tspan> return NEW arrays — always save them:  <tspan font-family="Fira Code, monospace" fill="#7b68ee">const</tspan> result = array.<tspan font-family="Fira Code, monospace" fill="#4ecca3">map</tspan>(...)</text>
</svg>
