<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ecca3"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="600" height="380" rx="14" fill="#0f0f1a"/>
  <rect x="1" y="1" width="598" height="378" rx="13" fill="none" stroke="#252540" stroke-width="1.5"/>

  <text x="30" y="40" font-family="Fira Code, monospace" font-size="13" font-weight="700" fill="url(#titleGrad)">02 — Mutating Arrays</text>
  <text x="30" y="62" font-family="DM Sans, sans-serif" font-size="11" fill="#555">Starting array: [10, 20, 30]</text>

  <!-- push -->
  <rect x="30" y="78" width="260" height="88" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="50" y="100" font-family="Fira Code, monospace" font-size="11" fill="#4ecca3" font-weight="700">push( )</text>
  <text x="50" y="116" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a0a0">Add to the END</text>
  <text x="50" y="135" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">nums.push(</text><text x="160" y="135" font-family="Fira Code, monospace" font-size="11" fill="#ffc107">40</text><text x="172" y="135" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">)</text>
  <text x="50" y="155" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [10, 20, 30, </text><text x="178" y="155" font-family="Fira Code, monospace" font-size="10" fill="#4ecca3">40</text><text x="192" y="155" font-family="Fira Code, monospace" font-size="10" fill="#555">]</text>

  <!-- pop -->
  <rect x="310" y="78" width="260" height="88" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="330" y="100" font-family="Fira Code, monospace" font-size="11" fill="#e94560" font-weight="700">pop( )</text>
  <text x="330" y="116" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a0a0">Remove from the END · returns removed item</text>
  <text x="330" y="135" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">const x = nums.pop()</text>
  <text x="330" y="155" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [10, 20]  x = </text><text x="440" y="155" font-family="Fira Code, monospace" font-size="10" fill="#e94560">30</text>

  <!-- shift -->
  <rect x="30" y="184" width="260" height="88" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="50" y="206" font-family="Fira Code, monospace" font-size="11" fill="#e94560" font-weight="700">shift( )</text>
  <text x="50" y="222" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a0a0">Remove from the FRONT · returns removed item</text>
  <text x="50" y="241" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">const x = nums.shift()</text>
  <text x="50" y="261" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [20, 30]  x = </text><text x="180" y="261" font-family="Fira Code, monospace" font-size="10" fill="#e94560">10</text>

  <!-- unshift -->
  <rect x="310" y="184" width="260" height="88" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="330" y="206" font-family="Fira Code, monospace" font-size="11" fill="#4ecca3" font-weight="700">unshift( )</text>
  <text x="330" y="222" font-family="DM Sans, sans-serif" font-size="10" fill="#a0a0a0">Add to the FRONT</text>
  <text x="330" y="241" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">nums.unshift(</text><text x="445" y="241" font-family="Fira Code, monospace" font-size="11" fill="#ffc107">5</text><text x="454" y="241" font-family="Fira Code, monospace" font-size="11" fill="#e0e0e0">)</text>
  <text x="330" y="261" font-family="Fira Code, monospace" font-size="10" fill="#555">→ [</text><text x="352" y="261" font-family="Fira Code, monospace" font-size="10" fill="#4ecca3">5</text><text x="361" y="261" font-family="Fira Code, monospace" font-size="10" fill="#555">, 10, 20, 30]</text>

  <!-- Memory trick -->
  <rect x="30" y="292" width="540" height="64" rx="8" fill="#252540" stroke="#555" stroke-width="1"/>
  <text x="50" y="312" font-family="DM Sans, sans-serif" font-size="11" fill="#a0a0a0" font-weight="600">🧠 Memory trick:</text>
  <text x="50" y="330" font-family="DM Sans, sans-serif" font-size="11" fill="#555">push/pop work at the END (like a stack of plates)  ·  shift = remove front, unshift = add front</text>
  <text x="50" y="348" font-family="Fira Code, monospace" font-size="10" fill="#7b68ee">pop()</text><text x="90" y="348" font-family="DM Sans, sans-serif" font-size="10" fill="#555"> and </text><text x="116" y="348" font-family="Fira Code, monospace" font-size="10" fill="#e94560">shift()</text><text x="157" y="348" font-family="DM Sans, sans-serif" font-size="10" fill="#555"> both return the removed value — useful to save it!</text>
</svg>
