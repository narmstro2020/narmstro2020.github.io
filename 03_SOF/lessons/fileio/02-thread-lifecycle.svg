<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <!-- Background -->
  <rect width="700" height="420" rx="16" fill="#0f0f1a"/>
  <rect x="1" y="1" width="698" height="418" rx="15" fill="none" stroke="#252540" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="38" font-size="18" font-weight="700" fill="#ffc107" text-anchor="middle">Java Thread Lifecycle</text>
  <text x="350" y="58" font-size="11" fill="#a0a0a0" text-anchor="middle">States a thread passes through from creation to completion</text>

  <!-- NEW -->
  <rect x="40" y="110" width="100" height="50" rx="10" fill="rgba(255,193,7,0.12)" stroke="rgba(255,193,7,0.4)" stroke-width="1.5"/>
  <text x="90" y="140" font-size="13" font-weight="700" fill="#ffc107" text-anchor="middle">NEW</text>

  <!-- Arrow NEW → RUNNABLE -->
  <line x1="145" y1="135" x2="195" y2="135" stroke="#ffc107" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="170" y="125" font-family="monospace" font-size="8" fill="#a0a0a0" text-anchor="middle">start()</text>

  <!-- RUNNABLE -->
  <rect x="200" y="110" width="120" height="50" rx="10" fill="rgba(78,204,163,0.12)" stroke="rgba(78,204,163,0.4)" stroke-width="1.5"/>
  <text x="260" y="140" font-size="13" font-weight="700" fill="#4ecca3" text-anchor="middle">RUNNABLE</text>

  <!-- Arrow RUNNABLE → RUNNING -->
  <line x1="325" y1="135" x2="375" y2="135" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrowGrn)"/>
  <text x="350" y="125" font-family="monospace" font-size="8" fill="#a0a0a0" text-anchor="middle">scheduled</text>

  <!-- RUNNING -->
  <rect x="380" y="110" width="120" height="50" rx="10" fill="rgba(123,104,238,0.15)" stroke="rgba(123,104,238,0.5)" stroke-width="2"/>
  <text x="440" y="140" font-size="13" font-weight="700" fill="#7b68ee" text-anchor="middle">RUNNING</text>

  <!-- Arrow RUNNING → TERMINATED -->
  <line x1="505" y1="135" x2="555" y2="135" stroke="#7b68ee" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="530" y="125" font-family="monospace" font-size="8" fill="#a0a0a0" text-anchor="middle">run() ends</text>

  <!-- TERMINATED -->
  <rect x="560" y="110" width="110" height="50" rx="10" fill="rgba(233,69,96,0.12)" stroke="rgba(233,69,96,0.4)" stroke-width="1.5"/>
  <text x="615" y="140" font-size="13" font-weight="700" fill="#e94560" text-anchor="middle">TERMINATED</text>

  <!-- BLOCKED/WAITING (below) -->
  <rect x="280" y="220" width="160" height="50" rx="10" fill="rgba(255,140,66,0.12)" stroke="rgba(255,140,66,0.4)" stroke-width="1.5"/>
  <text x="360" y="245" font-size="13" font-weight="700" fill="#ff8c42" text-anchor="middle">BLOCKED</text>
  <text x="360" y="260" font-size="9" fill="#a0a0a0" text-anchor="middle">waiting for lock</text>

  <!-- Arrow RUNNING → BLOCKED -->
  <path d="M440,165 L440,195 L410,220" fill="none" stroke="#ff8c42" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="455" y="195" font-family="monospace" font-size="8" fill="#a0a0a0">synchronized</text>

  <!-- Arrow BLOCKED → RUNNABLE -->
  <path d="M310,220 L280,195 L260,165" fill="none" stroke="#4ecca3" stroke-width="1.5" marker-end="url(#arrowGrn)"/>
  <text x="265" y="200" font-family="monospace" font-size="8" fill="#a0a0a0">lock acquired</text>

  <!-- Code examples -->
  <rect x="40" y="300" width="300" height="100" rx="10" fill="rgba(78,204,163,0.05)" stroke="rgba(78,204,163,0.2)" stroke-width="1"/>
  <text x="60" y="322" font-size="11" font-weight="700" fill="#4ecca3">Creating with Thread class</text>
  <text x="60" y="342" font-family="monospace" font-size="10" fill="#a0a0a0">Thread t = <tspan fill="#7b68ee">new</tspan> Thread(() -&gt; {</text>
  <text x="60" y="358" font-family="monospace" font-size="10" fill="#a0a0a0">    System.out.println(<tspan fill="#ffc107">"Hello!"</tspan>);</text>
  <text x="60" y="374" font-family="monospace" font-size="10" fill="#a0a0a0">});</text>
  <text x="60" y="390" font-family="monospace" font-size="10" fill="#a0a0a0">t.<tspan fill="#4ecca3">start</tspan>();</text>

  <rect x="360" y="300" width="300" height="100" rx="10" fill="rgba(123,104,238,0.05)" stroke="rgba(123,104,238,0.2)" stroke-width="1"/>
  <text x="380" y="322" font-size="11" font-weight="700" fill="#7b68ee">Creating with ExecutorService</text>
  <text x="380" y="342" font-family="monospace" font-size="10" fill="#a0a0a0">ExecutorService pool =</text>
  <text x="380" y="358" font-family="monospace" font-size="10" fill="#a0a0a0">  Executors.<tspan fill="#7b68ee">newFixedThreadPool</tspan>(3);</text>
  <text x="380" y="374" font-family="monospace" font-size="10" fill="#a0a0a0">pool.<tspan fill="#4ecca3">submit</tspan>(() -&gt; loadAssets());</text>
  <text x="380" y="390" font-family="monospace" font-size="10" fill="#a0a0a0">pool.<tspan fill="#e94560">shutdown</tspan>();</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffc107"/>
    </marker>
    <marker id="arrowGrn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ecca3"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b68ee"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ff8c42"/>
    </marker>
  </defs>
</svg>
